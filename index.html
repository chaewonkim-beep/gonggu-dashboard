<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>달콤수학 공구 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --page-bg: #F0EBE5;
  --cream: #FFFFFF;
  --cream2: #F7F2EC;
  --yellow: #F5C842;
  --yellow-light: #FEF4C0;
  --brown: #7B5C3E;
  --brown-light: #F2EAE0;
  --orange: #F08030;
  --orange-light: #FDE8D0;
  --red: #E05040;
  --red-light: #FCE4E0;
  --green: #4CAF50;
  --green-light: #E8F5E9;
  --gray: #9E9E9E;
  --gray-light: #F5F5F0;
  --text-dark: #3D2B1F;
  --text-mid: #6B4F3A;
  --text-light: #A08878;
  --border: #E8DDD0;
  --border-light: #EDE5DC;
  --shadow: 0 1px 8px rgba(0,0,0,0.08);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.11);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.05);
  --radius: 14px;
  --radius-sm: 9px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--page-bg);
  color: var(--text-dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── 헤더 ─── */
#app-header {
  background: var(--brown);
  color: #fff;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
#app-header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
#header-date { font-size: 13px; opacity: 0.85; }


/* ─── 메인 레이아웃 ─── */
#app-body { display: flex; flex: 1; min-height: 0; }

/* ─── 왼쪽 목차 ─── */
#sidebar {
  width: 180px;
  min-width: 180px;
  background: #fff;
  border-right: 1px solid var(--border-light);
  padding: 16px 0;
  position: sticky;
  top: 53px;
  height: calc(100vh - 53px);
  overflow-y: auto;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  border-left: 3px solid transparent;
  border-radius: 0 8px 8px 0;
  margin: 1px 8px 1px 0;
  transition: all 0.15s;
}
.nav-item:hover { background: var(--brown-light); color: var(--brown); }
.nav-item.active { background: var(--yellow-light); color: var(--brown); font-weight: 700; border-left-color: var(--yellow); }
.nav-icon { font-size: 15px; }

/* ─── 콘텐츠 ─── */
#content { flex: 1; padding: 28px 32px; overflow-y: auto; max-width: 1000px; }
.section { display: none; }
.section.active { display: block; }
.section-title { font-size: 17px; font-weight: 700; color: var(--text-dark); margin-bottom: 22px; display: flex; align-items: center; gap: 8px; }

/* ─── 카드 ─── */
.card { background: #fff; border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }

/* ─── 배지 ─── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-yellow { background: var(--yellow-light); color: #7B6010; }
.badge-brown  { background: var(--brown-light);  color: var(--brown); }
.badge-orange { background: var(--orange-light); color: #A04010; }
.badge-red    { background: var(--red-light);    color: var(--red); }
.badge-green  { background: var(--green-light);  color: #2E7D32; }
.badge-gray   { background: var(--gray-light);   color: var(--gray); }
.badge-green  { background: var(--green-light);  color: #2E7D32; font-weight: 700; }

/* ─── 버튼 ─── */
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: var(--yellow); color: var(--brown); }
.btn-primary:hover { background: #E6B820; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-mid); }
.btn-outline:hover { border-color: var(--brown); color: var(--brown); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-archive { background: var(--gray-light); color: var(--gray); }
.btn-archive:hover { background: #E0E0D8; color: #666; }
.btn-done { background: var(--green-light); color: #2E7D32; }
.btn-done:hover { background: #C8E6C9; }

/* ─── 폼 ─── */
.form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 11px; font-weight: 600; color: var(--text-light); letter-spacing: 0.2px; }
select, input[type="text"], textarea {
  font-family: inherit; font-size: 13px; padding: 8px 11px;
  border: 1.5px solid var(--border-light); border-radius: var(--radius-sm);
  background: var(--cream2); color: var(--text-dark); outline: none; transition: border-color 0.15s, background 0.15s;
}
select:focus, input[type="text"]:focus, textarea:focus { border-color: var(--yellow); background: #fff; }
textarea { resize: vertical; min-height: 60px; }



/* ─── 토스트 ─── */
#toast { position: fixed; bottom: 28px; right: 28px; background: var(--brown); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-md); z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
#toast.show { transform: translateY(0); opacity: 1; }

/* ─── ① 오늘 확인 ─── */
.today-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.today-sales-wrap { margin-top: 16px; }
.today-zone { background: #fff; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
.today-zone-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1.5px solid var(--border-light); display: flex; align-items: center; gap: 6px; }
.zone-today .today-zone-title { color: var(--red); }
.zone-week  .today-zone-title { color: var(--orange); }
.zone-issue .today-zone-title { color: var(--brown); }
.today-task-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border-light); font-size: 13px; }
.today-task-item:last-child { border-bottom: none; }
.today-task-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--brown); }
.today-task-text { flex: 1; line-height: 1.5; }
.today-task-text.done { text-decoration: line-through; color: var(--text-light); }
.today-vendor-tag { font-size: 10px; font-weight: 700; color: var(--brown); background: var(--brown-light); padding: 2px 7px; border-radius: 5px; white-space: nowrap; }
.empty-zone { color: var(--text-light); font-size: 13px; text-align: center; padding: 20px 0; }

/* ─── ② 공구 일정 ─── */
.schedule-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
.calendar-card { background: #fff; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-header button { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--brown); padding: 4px 8px; border-radius: 6px; }
.cal-header button:hover { background: var(--brown-light); }
.cal-month { font-size: 15px; font-weight: 700; color: var(--brown); }
.cal-grid { display: block; }
.cal-week { display: flex; margin-bottom: 2px; }
.cal-dow { flex: 1; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-light); padding: 4px 0; }
.cal-day { flex: 1; text-align: center; padding: 6px 2px; font-size: 12px; cursor: default; border-radius: 6px; color: var(--text-dark); }
.cal-day:not(.range-fill):hover { background: var(--cream2); }
.cal-day.range-fill { background: var(--orange-light); border-radius: 0; cursor: pointer; }
.cal-day.range-fill:hover { background: #FDDBB0; }
.cal-day.range-fill.range-start { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
.cal-day.range-fill.range-end   { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

/* ─── 커스텀 데이트피커 ─── */
#dp-overlay { display:none; position:fixed; inset:0; z-index:400; }
#dp-picker {
  display:none; position:fixed; z-index:401;
  background:#fff; border-radius:var(--radius);
  box-shadow:0 8px 28px rgba(0,0,0,0.14);
  padding:14px 16px; min-width:252px; user-select:none;
}
#dp-picker .dp-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
#dp-picker .dp-nav { background:none; border:none; cursor:pointer; font-size:16px; color:var(--brown); padding:4px 8px; border-radius:6px; }
#dp-picker .dp-nav:hover { background:var(--brown-light); }
#dp-picker .dp-month { font-size:14px; font-weight:700; color:var(--brown); }
#dp-picker .dp-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
#dp-picker .dp-dow { font-size:11px; color:var(--text-light); text-align:center; padding:4px 0; font-weight:600; }
#dp-picker .dp-day {
  font-size:13px; text-align:center; padding:5px 2px; border-radius:6px;
  cursor:pointer; color:var(--text-dark);
}
#dp-picker .dp-day:hover { background:var(--cream2); }
#dp-picker .dp-day.today { font-weight:700; color:var(--orange); }
#dp-picker .dp-day.selected { background:var(--brown); color:#fff; }
#dp-picker .dp-day.other { color:var(--border); cursor:default; }
#dp-picker .dp-day.other:hover { background:none; }

/* ─── 공구 이벤트 팝업 ─── */
#ev-popup-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(61,43,31,0.25); }
#ev-popup {
  display:none; position:fixed; z-index:201;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:#fff; border-radius:var(--radius); padding:24px;
  min-width:320px; max-width:440px; width:92%;
  box-shadow:0 8px 32px rgba(0,0,0,0.14);
  max-height:80vh; overflow-y:auto;
}

/* ─── 캘린더 팝업 ─── */
#cal-popup-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(61,43,31,0.25); }
#cal-popup {
  display:none; position:fixed; z-index:201;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:#fff; border-radius:var(--radius); padding:22px;
  min-width:300px; max-width:400px; width:90%;
  box-shadow:0 8px 32px rgba(0,0,0,0.14);
  max-height:80vh; overflow-y:auto;
}
.cal-popup-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.cal-popup-date { font-size:16px; font-weight:700; color:var(--brown); }
.cal-popup-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-light); line-height:1; padding:0 2px; }
.cal-popup-close:hover { color:var(--brown); }
.cal-popup-event { padding:12px; background:var(--cream2); border-radius:var(--radius-sm); margin-bottom:8px; }
.cal-popup-event:last-child { margin-bottom:0; }
.cal-day.today { background: var(--yellow); color: var(--brown); font-weight: 700; }
.cal-day.has-event:not(.today) { background: var(--orange-light); }
.cal-day.other-month { color: var(--text-light); }
.cal-day.sunday { color: var(--red); }
.cal-day.saturday { color: #5080C0; }
.event-list { display: flex; flex-direction: column; gap: 12px; }
.event-card { background: #fff; border-radius: var(--radius); padding: 16px 18px; box-shadow: var(--shadow); }
.event-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.event-title { font-size: 14px; font-weight: 600; }
.event-meta { font-size: 12px; color: var(--text-light); display: flex; gap: 10px; margin-bottom: 8px; }
.event-links { display: flex; gap: 8px; flex-wrap: wrap; }
.event-link-btn { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; cursor: pointer; border: none; background: var(--cream2); color: var(--text-mid); font-family: inherit; transition: background 0.15s; }
.event-link-btn:hover { background: var(--yellow-light); }
.event-linked-items { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: none; font-size: 12px; }
.event-linked-items.open { display: block; }
.linked-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; color: var(--text-mid); }
.linked-item::before { content: '•'; color: var(--yellow); }

/* ─── ③ 공구사 현황 ─── */
.vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.vendor-card { background: #fff; border-radius: var(--radius); padding: 16px; cursor: pointer; box-shadow: var(--shadow); transition: all 0.18s; }
.vendor-card:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
.vendor-card.selected { box-shadow: 0 0 0 2px var(--orange), var(--shadow-md); }
.vendor-card.paused { opacity: 0.55; background: var(--gray-light); }
.vendor-card.paused .vendor-name { color: var(--gray); }
.vendor-name { font-size: 15px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
.progress-bar-wrap { background: var(--cream2); border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 6px; }
.progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--yellow), var(--orange)); transition: width 0.4s; }
.progress-label { font-size: 12px; color: var(--text-light); }
.sales-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, #5DB87A, #3A9A5C); transition: width 0.4s; }
#vendor-detail-panel { background: #fff; border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow-md); display: none; }
#vendor-detail-panel.open { display: block; }
.detail-panel-title { font-size: 16px; font-weight: 700; color: var(--text-dark); margin-bottom: 18px; }
.detail-section { margin-bottom: 18px; }
.detail-section-label { font-size: 11px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.section-chip { display: inline-flex; align-items: center; background: var(--brown-light); color: var(--brown); font-size: 12px; font-weight: 700; padding: 3px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.2px; }
.step-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 3px 0; }
.step-item input[type="checkbox"] { accent-color: var(--brown); width: 15px; height: 15px; }
.step-item.checked span { text-decoration: line-through; color: var(--text-light); }
.detail-comm-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--border-light); color: var(--text-mid); }
.detail-comm-item:last-child { border-bottom: none; }
.detail-task-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 5px 0; }
.detail-task-item input[type="checkbox"] { accent-color: var(--brown); }

/* ─── ④ 할 일 ─── */
.task-add-form { background: #fff; border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.task-add-form h3 { font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 14px; }
.task-filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border-light); background: var(--cream2); font-size: 12px; font-weight: 600; color: var(--text-mid); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.filter-btn.active { background: var(--yellow-light); border-color: var(--yellow); color: var(--brown); }
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-item { display: flex; align-items: center; gap: 10px; background: #fff; border-radius: var(--radius-sm); padding: 13px 16px; box-shadow: var(--shadow-sm); transition: opacity 0.2s, box-shadow 0.15s; }
.task-item:hover { box-shadow: var(--shadow); }
.task-item.done-item { opacity: 0.55; }
.task-item.archived-item { opacity: 0.4; background: var(--gray-light); }
.task-item input[type="checkbox"] { accent-color: var(--brown); width: 16px; height: 16px; flex-shrink: 0; }
.task-item-body { flex: 1; min-width: 0; }
.task-item-content { font-size: 13px; font-weight: 500; line-height: 1.4; }
.task-item-content.done-text { text-decoration: line-through; color: var(--text-light); }
.task-item-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.task-event-tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--orange-light); color: #A04010; font-weight: 600; }
.task-comm-link { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--cream2); color: var(--text-mid); font-weight: 500; cursor: pointer; }
.task-comm-link:hover { background: var(--brown-light); }
.task-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.archive-section { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 14px; }
.archive-toggle { font-size: 12px; font-weight: 600; color: var(--text-light); cursor: pointer; background: none; border: none; font-family: inherit; display: flex; align-items: center; gap: 4px; padding: 0; }
.archive-toggle:hover { color: var(--brown); }
.archive-list { margin-top: 10px; display: none; }
.archive-list.open { display: flex; flex-direction: column; gap: 8px; }

/* ─── ⑤ 소통 기록 ─── */
.comm-add-form { background: #fff; border-radius: var(--radius); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }
.comm-add-form h3 { font-size: 13px; font-weight: 700; color: var(--text-dark); margin-bottom: 14px; }
.followup-section { background: var(--cream2); border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; display: none; }
.followup-section.open { display: block; }
.followup-label { font-size: 12px; font-weight: 600; color: var(--brown); margin-bottom: 8px; }
.comm-feed { display: flex; flex-direction: column; gap: 8px; }
.comm-item { background: #fff; border-radius: var(--radius-sm); padding: 14px 16px; box-shadow: var(--shadow-sm); transition: box-shadow 0.15s; }
.comm-item:hover { box-shadow: var(--shadow); }
.comm-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.comm-item-content { font-size: 13px; color: var(--text-dark); line-height: 1.5; }
.comm-item-followup { margin-top: 8px; padding: 6px 10px; background: var(--cream2); border-radius: 6px; font-size: 12px; color: var(--brown); cursor: pointer; }
.comm-item-followup:hover { background: var(--yellow-light); }
.checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text-mid); cursor: pointer; }
.checkbox-label input { accent-color: var(--brown); width: 15px; height: 15px; }

/* ─── 모바일 대응 클래스 ─── */
.step-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 12px; }
.detail-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 8px; }
.vendor-hist-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

/* ─── 하단 탭바 (모바일) ─── */
#bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: #fff;
  border-top: 1px solid var(--border-light);
  box-shadow: 0 -2px 12px rgba(0,0,0,0.08);
  height: 60px;
}
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  color: var(--text-light);
  cursor: pointer;
  padding: 4px 2px;
  border-top: 3px solid transparent;
  transition: all 0.15s;
  min-width: 0;
  -webkit-tap-highlight-color: transparent;
}
.bottom-nav-item.active { color: var(--brown); border-top-color: var(--yellow); background: var(--yellow-light); }
.bottom-nav-item .bnav-icon { font-size: 18px; line-height: 1.2; }
.bottom-nav-item .bnav-label { font-size: 9px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

@media (max-width: 900px) {
  .today-grid { grid-template-columns: 1fr; }
  .schedule-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  #sidebar { width: 54px; min-width: 54px; }
  .nav-item span:not(.nav-icon) { display: none; }
  #content { padding: 16px; }
  .step-grid { grid-template-columns: 1fr; }
  .detail-two-col { grid-template-columns: 1fr; }
  .vendor-hist-two-col { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  #sidebar { display: none; }
  #app-header { padding: 10px 16px; }
  #app-header h1 { font-size: 15px; }
  #header-date { display: none; }
  #content { padding: 14px; max-width: 100%; padding-bottom: 72px; }
  .section-title { font-size: 17px; margin-bottom: 14px; }
  .today-grid { grid-template-columns: 1fr; }

let _dpTarget = null, _dpYear = 0, _dpMonth = 0;
const DAYS_KO = ['일','월','화','수','목','금','토'];

function openDatePicker(input) {
  _dpTarget = input;
  const val = parseSmartDate(input.value) || todayStr();
  const parts = val.match(/^(\d{4})-(\d{2})/);
  _dpYear  = parts ? +parts[1] : TODAY.getFullYear();
  _dpMonth = parts ? +parts[2] - 1 : TODAY.getMonth();
  renderDpGrid();
  const rect = input.getBoundingClientRect();
  const picker = document.getElementById('dp-picker');
  picker.style.display = 'block';
  const top = rect.bottom + 4;
  const left = Math.min(rect.left, window.innerWidth - 270);
  picker.style.top  = top + 'px';
  picker.style.left = left + 'px';
  document.getElementById('dp-overlay').style.display = 'block';
}
function closeDatePicker() {
  document.getElementById('dp-picker').style.display = 'none';
  document.getElementById('dp-overlay').style.display = 'none';
  if (_dpTarget) { _dpTarget.value = parseSmartDate(_dpTarget.value); _dpTarget = null; }
}
function dpNav(dir) {
  _dpMonth += dir;
  if (_dpMonth < 0)  { _dpMonth = 11; _dpYear--; }
  if (_dpMonth > 11) { _dpMonth = 0;  _dpYear++; }
  renderDpGrid();
}
function dpSelect(y, m, d) {
  const val = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  if (_dpTarget) { _dpTarget.value = val; _dpTarget.dispatchEvent(new Event('input', {bubbles:true})); }
  document.getElementById('dp-picker').style.display = 'none';
  document.getElementById('dp-overlay').style.display = 'none';
  _dpTarget = null;
}
function renderDpGrid() {
  const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  document.getElementById('dp-month-label').textContent = `${_dpYear}년 ${months[_dpMonth]}`;
  const grid = document.getElementById('dp-grid');
  const todayS = todayStr();
  const selVal = _dpTarget ? parseSmartDate(_dpTarget.value) : '';
  const first = new Date(_dpYear, _dpMonth, 1).getDay();
  const lastDay = new Date(_dpYear, _dpMonth+1, 0).getDate();
  let html = DAYS_KO.map(d=>`<div class="dp-dow">${d}</div>`).join('');
  for (let i=0; i<first; i++) html += `<div class="dp-day other"></div>`;
  for (let d=1; d<=lastDay; d++) {
    const ds = `${_dpYear}-${String(_dpMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls = [ds===todayS?'today':'', ds===selVal?'selected':''].join(' ');
    html += `<div class="dp-day ${cls}" onclick="dpSelect(${_dpYear},${_dpMonth},${d})">${d}</div>`;
  }
  grid.innerHTML = html;
}

document.addEventListener('click', e => {

const S = { vendors:[], events:[], tasks:[], comms:[], progress:{}, evtProgress:{}, insta:[] };
const DONE_MIGRATIONS = new Set(JSON.parse(localStorage.getItem('gg2_migrations') || '[]'));
function markMigrated(key) { DONE_MIGRATIONS.add(key); localStorage.setItem('gg2_migrations', JSON.stringify([...DONE_MIGRATIONS])); }

async function load() {
  try {
    const { data, error } = await sb.from('gg_store').select('key,value');
    if (error) throw error;
    const map = Object.fromEntries((data || []).map(r => [r.key, r.value]));
    S.vendors     = map['vendors']      || JSON.parse(localStorage.getItem('gg2_vendors'))      || JSON.parse(JSON.stringify(DEFAULT_VENDORS));
    S.events      = map['events']       || JSON.parse(localStorage.getItem('gg2_events'))       || JSON.parse(JSON.stringify(DEFAULT_EVENTS));
    S.tasks       = map['tasks']        || JSON.parse(localStorage.getItem('gg2_tasks'))        || JSON.parse(JSON.stringify(DEFAULT_TASKS));
    S.comms       = map['comms']        || JSON.parse(localStorage.getItem('gg2_comms'))        || JSON.parse(JSON.stringify(DEFAULT_COMMS));
    S.progress    = map['progress']     || JSON.parse(localStorage.getItem('gg2_progress'))     || JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
    S.evtProgress = map['evt_progress'] || JSON.parse(localStorage.getItem('gg2_evt_progress')) || JSON.parse(JSON.stringify(DEFAULT_EVENT_PROGRESS));
    S.insta       = map['insta']        || JSON.parse(localStorage.getItem('gg2_insta'))        || [];
  } catch(e) {
    console.warn('Supabase 로드 실패, 로컬 데이터 사용:', e);
    S.vendors     = JSON.parse(localStorage.getItem('gg2_vendors'))      || JSON.parse(JSON.stringify(DEFAULT_VENDORS));
    S.events      = JSON.parse(localStorage.getItem('gg2_events'))       || JSON.parse(JSON.stringify(DEFAULT_EVENTS));
    S.tasks       = JSON.parse(localStorage.getItem('gg2_tasks'))        || JSON.parse(JSON.stringify(DEFAULT_TASKS));
    S.comms       = JSON.parse(localStorage.getItem('gg2_comms'))        || JSON.parse(JSON.stringify(DEFAULT_COMMS));
    S.progress    = JSON.parse(localStorage.getItem('gg2_progress'))     || JSON.parse(JSON.stringify(DEFAULT_PROGRESS));
    S.evtProgress = JSON.parse(localStorage.getItem('gg2_evt_progress')) || JSON.parse(JSON.stringify(DEFAULT_EVENT_PROGRESS));
    S.insta       = JSON.parse(localStorage.getItem('gg2_insta'))        || [];
  }
  migrateVendors();
  migrateEvents();
  migrateProgress();
  migrateBaobab();
}
function migrateProgress() {
  S.vendors.forEach(v => {
    const p = S.progress[v.id];
    if (!p || JSON.stringify(p.steps) !== JSON.stringify(PROGRESS_STEPS)) {
      // 기존 체크 수만큼 앞에서부터 순서대로 적용
      const checkedCount = p ? p.checked.filter(Boolean).length : 0;
      S.progress[v.id] = {
        steps:   PROGRESS_STEPS,
        checked: PROGRESS_STEPS.map((_, i) => i < checkedCount),
      };
    }
  });
}
function migrateVendors() {
  const newVendors = [
    { id: 'gabefam', name: '가베가족', paused: false },
  ];
  newVendors.forEach(nv => {
    if (!S.vendors.find(v => v.id === nv.id)) S.vendors.push(nv);
  });
  S.vendors = S.vendors.map(v => ({
    ...v,
    website:       v.website       ?? '',
    contact:       v.contact       ?? '',
    contactPerson: v.contactPerson ?? '',
    contactEmail:  v.contactEmail  ?? '',
  }));
}
function migrateBaobab() {
  if (DONE_MIGRATIONS.has('baobab_v1')) return;
  const v = S.vendors.find(v => v.id === 'baobab');
  if (v && v.name === '바오밥') v.name = '행복한 바오밥';

  // evt-001을 셈셈 보드게임 6/15~6/22로 업데이트
  const ev = S.events.find(e => e.id === 'evt-001');
  if (ev) { ev.title = '셈셈 보드게임'; ev.startDate = '2026-06-15'; ev.endDate = '2026-06-22'; }

  // evt-010 칼타공기 일정 8/20~8/24로 수정
  const ev010 = S.events.find(e => e.id === 'evt-010');
  if (ev010) { ev010.startDate = '2026-08-20'; ev010.endDate = '2026-08-24'; }

  // evt-004 비상 공구 일정 8/26~8/30으로 수정
  const ev004 = S.events.find(e => e.id === 'evt-004');
  if (ev004) { ev004.startDate = '2026-08-26'; ev004.endDate = '2026-08-30'; }

  // evt-006, evt-007 → evt-001으로 통합 후 삭제
  ['evt-006', 'evt-007'].forEach(id => {
    S.tasks.forEach(t => { if (t.eventId === id) t.eventId = 'evt-001'; });
    S.comms.forEach(c => { if (c.eventId === id) c.eventId = 'evt-001'; });
    S.events = S.events.filter(e => e.id !== id);
  });

  delete S.evtProgress['evt-006'];
  delete S.evtProgress['evt-007'];
  markMigrated('baobab_v1');
}
function migrateEvents() {
  // date → startDate 변환
  S.events = S.events.map(e => ({
    ...e,
    startDate: e.startDate || e.date || '',
    endDate:   'endDate' in e ? e.endDate : null,
    archived:  e.archived || false,
  }));
  // 기존 시작/종료 쌍 통합
  [
    { startId:'evt-008', endId:'evt-009', endDate:'2026-07-14', title:'낼나 타임타이머 공구' },
    { startId:'evt-010', endId:'evt-011', endDate:'2026-07-24', title:'칼타공기 공구' },
    { startId:'evt-012', endId:'evt-013', endDate:'2026-10-05', title:'일프로 연산 공구' },
  ].forEach(({ startId, endId, endDate, title }) => {
    const st = S.events.find(e => e.id === startId);
    if (st && !st.endDate) { st.endDate = endDate; st.title = title; }
    S.events = S.events.filter(e => e.id !== endId);
    S.tasks.forEach(t => { if (t.eventId === endId) t.eventId = startId; });
    S.comms.forEach(c => { if (c.eventId === endId) c.eventId = startId; });
  });
}
function save() {
  // 로컬 캐시 즉시 저장
  localStorage.setItem('gg2_vendors',      JSON.stringify(S.vendors));
  localStorage.setItem('gg2_events',       JSON.stringify(S.events));
  localStorage.setItem('gg2_tasks',        JSON.stringify(S.tasks));
  localStorage.setItem('gg2_comms',        JSON.stringify(S.comms));
  localStorage.setItem('gg2_progress',     JSON.stringify(S.progress));
  localStorage.setItem('gg2_evt_progress', JSON.stringify(S.evtProgress));
  localStorage.setItem('gg2_insta',        JSON.stringify(S.insta));
  // Supabase 백그라운드 저장
  sb.from('gg_store').upsert([
    { key: 'vendors',      value: S.vendors },
    { key: 'events',       value: S.events },
    { key: 'tasks',        value: S.tasks },
    { key: 'comms',        value: S.comms },
    { key: 'progress',     value: S.progress },
    { key: 'evt_progress', value: S.evtProgress },
    { key: 'insta',        value: S.insta },
  ]).then(({ error }) => { if (error) console.error('Supabase 저장 오류:', error); });
}

// ══════════════ 유틸 ══════════════
const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

function todayStr() {
  return `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
}
function dday(ds)   { const d = new Date(ds); d.setHours(0,0,0,0); return Math.round((d-TODAY)/86400000); }
function ddayLabel(ds) { const n=dday(ds); return n===0?'D-Day':n>0?`D-${n}`:`D+${Math.abs(n)}`; }
function fmtDate(ds) { const [,m,d]=ds.split('-'); return `${m}/${d}`; }
function parseSmartDate(val) {
  val = val.trim();
  if (!val || val === new Date().getFullYear() + '-') return '';
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const y = new Date().getFullYear();
  if (/^\d{4}$/.test(val)) return `${y}-${val.slice(0,2)}-${val.slice(2,4)}`;
  if (/^\d{8}$/.test(val)) return `${val.slice(0,4)}-${val.slice(4,6)}-${val.slice(6,8)}`;
  if (/^\d{4}-\d{4}$/.test(val)) return `${val.slice(0,4)}-${val.slice(5,7)}-${val.slice(7,9)}`;
  return val;
}
function vendorName(id) { const v=S.vendors.find(v=>v.id===id); return v?v.name:id; }

// ── 이벤트 범위 헬퍼 ──
function evStart(e)  { return e.startDate || e.date || ''; }
function evEnd(e)    { return e.endDate || null; }
function evIsActive(e) {
  const end = evEnd(e);
  return end ? dday(end) >= 0 : dday(evStart(e)) >= 0;
}
function evDdayLabel(e) {
  const end = evEnd(e), start = evStart(e);
  if (end) {
    if (dday(start) > 0) return `D-${dday(start)}`;
    if (dday(end) >= 0)  return '진행중';
    return '종료';
  }
  return ddayLabel(start);
}
function evBadgeCls(e) {
  const end = evEnd(e), start = evStart(e);
  if (end) {
    const sd = dday(start);
    if (sd > 0) return sd <= 7 ? 'badge-orange' : 'badge-brown';
    return 'badge-green';
  }
  const n = dday(start);
  return n===0?'badge-red':n<0?'badge-gray':n<=7?'badge-orange':'badge-brown';
}
function evStatusText(e) {
  const end = evEnd(e), start = evStart(e);
  if (end) {
    if (dday(start) > 0) return `${dday(start)}일 남음`;
    if (dday(end) === 0) return '오늘 마감';
    if (dday(end) > 0)   return `${dday(end)}일 남음`;
    return '종료';
  }
  const n = dday(start);
  if (n > 0) return `${n}일 남음`;
  if (n === 0) return '오늘';
  return '종료';
}
function evFmtDate(e) {
  const end = evEnd(e);
  return end ? `${fmtDate(evStart(e))}~${fmtDate(end)}` : fmtDate(evStart(e));
}
function evRangeBar(e) {
  const end = evEnd(e), start = evStart(e);
  if (!end) return '';
  const sd = new Date(start), ed = new Date(end);
  const total   = Math.max((ed - sd) / 86400000, 1);
  const elapsed = Math.min(Math.max((TODAY - sd) / 86400000, 0), total);
  const pct     = Math.round(elapsed / total * 100);
  return `<div style="margin:8px 0 2px">
    <div style="height:8px;background:var(--cream2);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:4px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);margin-top:2px">
      <span>${fmtDate(start)}</span><span>${fmtDate(end)}</span>
    </div>
  </div>`;
}
function buildEvDateSet() {
  const dates = new Set();
  S.events.forEach(e => {
    const start = evStart(e), end = evEnd(e);
    if (!end) { dates.add(start); return; }
    let cur = new Date(start);
    const last = new Date(end);
    while (cur <= last) { dates.add(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  });
  return dates;
}
function eventById(id)  { return S.events.find(e=>e.id===id); }
function getEvProg(evId) {
  if (!S.evtProgress[evId]) S.evtProgress[evId] = { checked: new Array(PROGRESS_STEPS.length).fill(false), links: [] };
  if (!S.evtProgress[evId].links) S.evtProgress[evId].links = [];
  if (S.evtProgress[evId].sales       == null) S.evtProgress[evId].sales       = '';
  if (S.evtProgress[evId].commission  == null) S.evtProgress[evId].commission  = '';
  if (S.evtProgress[evId].salesTarget == null) S.evtProgress[evId].salesTarget = '';
  if (S.evtProgress[evId].salesCount  == null) S.evtProgress[evId].salesCount  = '';
  if (S.evtProgress[evId].schedule    == null) S.evtProgress[evId].schedule    = '';
  if (S.evtProgress[evId].targetAge   == null) S.evtProgress[evId].targetAge   = '';
  if (S.evtProgress[evId].memo        == null) S.evtProgress[evId].memo        = '';
  if (!S.evtProgress[evId].evEvents)           S.evtProgress[evId].evEvents    = [];
  if (S.evtProgress[evId].checked.length < PROGRESS_STEPS.length)
    S.evtProgress[evId].checked = [...S.evtProgress[evId].checked, ...new Array(PROGRESS_STEPS.length - S.evtProgress[evId].checked.length).fill(false)];
  return S.evtProgress[evId];
}
function taskById(id)   { return S.tasks.find(t=>t.id===id); }
function commById(id)   { return S.comms.find(c=>c.id===id); }
function genId(p)       { return p+'-'+Date.now()+'-'+Math.floor(Math.random()*1000); }
function toast(msg) {

// ══════════════ ② 공구 일정 ══════════════
let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();

function buildRangeMap() {
  const map = {};
  S.events.forEach(e => {
    const s = evStart(e), en = evEnd(e) || evStart(e);
    let cur = new Date(s + 'T00:00:00'), last = new Date(en + 'T00:00:00');
    while (cur <= last) {
      const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
      if (!map[ds]) map[ds] = { isStart: false, isEnd: false };
      if (ds === s)  map[ds].isStart = true;
      if (ds === en) map[ds].isEnd   = true;
      cur.setDate(cur.getDate()+1);
    }
  });
  return map;
}

function renderCalendar() {
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid  = document.getElementById('cal-grid');
  const dows  = ['일','월','화','수','목','금','토'];
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth+1, 0);
  const rmap  = buildRangeMap();

  // DOW 헤더
  let html = `<div class="cal-week">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>`;

  // 전체 날짜 배열 (앞뒤 패딩 포함)
  const cells = [];
  for (let i=0; i<first.getDay(); i++) cells.push(null);
  for (let d=1; d<=last.getDate(); d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  for (let w=0; w<cells.length/7; w++) {
    html += '<div class="cal-week">';
    for (let i=0; i<7; i++) {
      const d   = cells[w*7+i];
      const dow = i; // 0=일,6=토
      if (d === null) { html += '<div class="cal-day other-month" style="flex:1"></div>'; continue; }
      const ds  = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
      const ri  = rmap[ds];
      const isToday = ds === todayStr();
      const cls = ['cal-day'];
      if (isToday) {
        cls.push('today');
      } else if (ri) {
        cls.push('range-fill');
        if (ri.isStart || i === 0) cls.push('range-start');
        if (ri.isEnd   || i === 6) cls.push('range-end');
      }
      if (dow === 0) cls.push('sunday');
      if (dow === 6) cls.push('saturday');
      html += `<div class="${cls.join(' ')}" style="flex:1;cursor:pointer" onclick="calDayClick('${ds}')">${d}</div>`;
    }
    html += '</div>';
  }
  grid.innerHTML = html;
  renderEventBars();
}

function deadlineInfo(ev) {
  const today = todayStr();
  const end   = evEnd(ev);
  const start = evStart(ev);
  const msDay = 86400000;
  const daysToStart = Math.round((new Date(start+'T00:00:00') - new Date(today+'T00:00:00')) / msDay);
  if (daysToStart > 0) {
    const color = daysToStart <= 7 ? 'var(--orange)' : 'var(--brown)';
    return { pct: 4, color, label: `${daysToStart}일 남음` };
  }
  const target = end || start;
  const daysLeft  = Math.round((new Date(target+'T00:00:00') - new Date(today+'T00:00:00')) / msDay);
  const totalDays = Math.max(1, Math.round((new Date(target+'T00:00:00') - new Date(start+'T00:00:00')) / msDay));
  if (daysLeft < 0)  return { pct: 100, color: 'var(--gray)',   label: '종료' };
  if (daysLeft === 0) return { pct: 100, color: 'var(--red)',    label: end ? '오늘 마감' : '오늘' };
  const elapsed = totalDays - daysLeft;
  const pct = Math.min(100, Math.max(4, Math.round(elapsed / totalDays * 100)));
  const color = daysLeft <= 3 ? 'var(--red)' : daysLeft <= 7 ? 'var(--orange)' : 'var(--green)';
  return { pct, color, label: `${daysLeft}일 남음` };
}

    grid.innerHTML = '<div style="color:var(--text-light);font-size:13px;padding:24px">등록된 공구가 없습니다</div>';

  grid.innerHTML = cardHtml(active) + (archvd.length ? `
    <div class="archive-section" style="grid-column:1/-1;margin-top:8px">
      <button class="archive-toggle" onclick="toggleGongguArchive(this)">▶ 보관함 (${archvd.length})</button>

        ${cardHtml(archvd)}

    </div>` : '');
}
function toggleGongguArchive(btn) {
  const list = document.getElementById('gonggu-archive-list');
  const open = list.style.display === 'grid';
  list.style.display = open ? 'none' : 'grid';
  btn.textContent = (open ? '▶' : '▼') + btn.textContent.slice(1);
}

function archiveEvent(evId) {
  const ev = S.events.find(e => e.id === evId); if (!ev) return;
  ev.archived = true;
  selectedGongguId = null;
  document.getElementById('gonggu-detail-panel').style.display = 'none';
  save(); renderGonggu();
  toast(`"${ev.title}" 보관함으로 이동됨`);
}
function unarchiveEvent(evId) {
  const ev = S.events.find(e => e.id === evId); if (!ev) return;
  ev.archived = false;
  save(); renderGonggu();
  toast(`"${ev.title}" 복원됨`);
}

function selectGonggu(id) {
  const panel = document.getElementById('gonggu-detail-panel');
  if (selectedGongguId === id) {
    selectedGongguId = null;
    panel.style.display = 'none';
    renderGonggu(); return;

  selectedGongguId = id;

}

function renderSalesBarHtml(prog) {
  const sales  = parseFloat(prog.sales)       || 0;
  const target = parseFloat(prog.salesTarget) || 0;
  const count  = parseInt(prog.salesCount)    || 0;
  if (!sales && !target && !count) return '';
  const pct    = target > 0 ? Math.min(Math.round(sales / target * 100), 100) : 0;
  const settle = sales * ((parseFloat(prog.commission) || 0) / 100);
  return `
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px">
      <span style="font-size:12px;color:var(--text-light)">매출 달성률</span>
      <span style="font-size:13px;font-weight:700;color:#3A9A5C">
        ${sales ? Math.round(sales).toLocaleString('ko-KR')+'원' : '—'}
        ${count ? `<span style="font-size:11px;font-weight:500;color:var(--text-light);margin-left:6px">${count.toLocaleString('ko-KR')}건</span>` : ''}
        ${target ? ` / 목표 ${Math.round(target).toLocaleString('ko-KR')}원` : ''}
      </span>
    </div>
    ${target ? `<div class="progress-bar-wrap" style="height:7px;margin-bottom:4px"><div class="sales-bar-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:11px;color:var(--text-light)">${pct}% 달성</span>
      ${settle ? `<span style="font-size:11px;color:var(--text-light)">정산 ${Math.round(settle).toLocaleString('ko-KR')}원</span>` : ''}
    </div>` : (settle ? `<div style="font-size:11px;color:var(--text-light)">정산 ${Math.round(settle).toLocaleString('ko-KR')}원</div>` : '')}
    ${!sales && count ? `<div style="font-size:11px;color:var(--text-light);margin-top:2px">매출 미입력</div>` : ''}`;
}

  const prog = getEvProg(evId);
  prog[field] = value;
  save();
}

    <div style="flex:1;min-width:0">
      <div style="font-size:13px;font-weight:600;margin-bottom:3px">🎁 ${ee.title}</div>
      ${ee.content ? `<div style="font-size:12px;color:var(--text-mid);margin-bottom:3px">${ee.content}</div>` : ''}
      ${period ? `<div style="font-size:12px;color:var(--text-mid);margin-bottom:3px">📅 참여기간: ${period}</div>` : ''}
      ${ee.announceDate ? `<div style="font-size:12px;color:var(--brown);font-weight:500;margin-bottom:3px">📢 발표일: ${ee.announceDate}</div>` : ''}
      ${ee.url ? `<a href="${ee.url}" target="_blank" style="font-size:12px;color:var(--brown);text-decoration:none">🔗 참여하기</a>` : ''}

function refreshEvEventsList(evId, prog) {
  const listEl = document.getElementById('ev-events-list-'+evId);
  if (!listEl) return;
  listEl.innerHTML = prog.evEvents.length
    ? prog.evEvents.map(ee => evEventItemHtml(evId, ee)).join('')
    : '<div style="font-size:13px;color:var(--text-light)">등록된 이벤트 없음</div>';
}
function addEvEvent(evId) {
  const title        = document.getElementById('ev-ev-title-'+evId).value.trim();
  const content      = document.getElementById('ev-ev-content-'+evId).value.trim();
  const startDate    = document.getElementById('ev-ev-start-'+evId).value.trim();
  const endDate      = document.getElementById('ev-ev-end-'+evId).value.trim();
  const announceDate = document.getElementById('ev-ev-announce-'+evId).value.trim();
  const url          = document.getElementById('ev-ev-url-'+evId).value.trim();
  if (!title) { toast('이벤트명을 입력해 주세요'); return; }
  const prog = getEvProg(evId);
  prog.evEvents.push({ id: genId('ee'), title, content, startDate, endDate, announceDate, url });
  if (announceDate) {
    const ev = S.events.find(e => e.id === evId);
    S.tasks.push({ id: genId('t'), vendorId: ev ? ev.vendorId : '', eventId: evId,
      content: `[이벤트 발표] ${title}`, done: false, archived: false,
      createdAt: todayStr(), dueDate: announceDate, assignee: '채원', followUpFromCommId: '' });
  }
  save();
  refreshEvEventsList(evId, prog);
  document.getElementById('ev-ev-title-'+evId).value = '';
  document.getElementById('ev-ev-content-'+evId).value = '';
  document.getElementById('ev-ev-start-'+evId).value = '';
  document.getElementById('ev-ev-end-'+evId).value = '';
  document.getElementById('ev-ev-announce-'+evId).value = '';
  document.getElementById('ev-ev-url-'+evId).value = '';
  toast(announceDate ? '이벤트가 추가됐습니다. 발표일 할 일도 생성됐어요!' : '이벤트가 추가됐습니다');
}
function removeEvEvent(evId, eeId) {
  const prog = getEvProg(evId);
  prog.evEvents = prog.evEvents.filter(e => e.id !== eeId);
  save();
  refreshEvEventsList(evId, prog);
}
function calcSettle(sales, commission) {
  const s = parseFloat(sales), c = parseFloat(commission);
  if (!s || isNaN(s)) return '—';
  const settle = s * ((isNaN(c) ? 0 : c) / 100);
  return Math.round(settle).toLocaleString('ko-KR') + '원';
}
function updateSettlement(evId) {
  const prog = getEvProg(evId);
  prog.salesTarget = document.getElementById('ev-target-'+evId)?.value ?? prog.salesTarget;
  prog.sales       = document.getElementById('ev-sales-'+evId).value;
  prog.salesCount  = document.getElementById('ev-count-'+evId)?.value ?? prog.salesCount;
  prog.commission  = document.getElementById('ev-comm-'+evId).value;
  document.getElementById('ev-settle-'+evId).textContent = calcSettle(prog.sales, prog.commission);
  const barEl = document.getElementById('ev-sales-bar-'+evId);
  if (barEl) barEl.innerHTML = renderSalesBarHtml(prog);
  save(); renderGonggu();
}

function addEvLink(evId) {
  const title = document.getElementById('ev-link-title-'+evId).value.trim();
  const desc  = document.getElementById('ev-link-desc-'+evId).value.trim();
  const url   = document.getElementById('ev-link-url-'+evId).value.trim();
  if (!title) { toast('링크 이름을 입력해 주세요'); return; }
  if (!url)   { toast('URL을 입력해 주세요'); return; }
  const prog = getEvProg(evId);
  prog.links.push({ id: genId('lk'), title, desc, url });
  save(); renderGongguDetail(evId); toast('링크가 추가되었습니다');
}

function removeEvLink(evId, linkId) {
  const prog = getEvProg(evId);
  prog.links = prog.links.filter(l => l.id !== linkId);
  save(); renderGongguDetail(evId);
}

function toggleEvStep(evId, idx, checked) {
  const prog = getEvProg(evId);
  prog.checked[idx] = checked;
  save(); renderGonggu(); renderGongguDetail(evId); renderToday();
  if (_openGongguDropdown === evId) renderGongguDetailInline(evId, document.getElementById('today-gonggu-dropdown'));
}

// ══════════════ ④ 공구사 현황 (누적 이력) ══════════════
let selectedVendorHistId = null;

function sortedVendors() {
  return [...S.vendors].sort((a, b) => {
    const lastA = S.comms.filter(c=>c.vendorId===a.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    const lastB = S.comms.filter(c=>c.vendorId===b.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    return (lastB ? lastB.date : '0000-00-00').localeCompare(lastA ? lastA.date : '0000-00-00');
  });
}

function renderVendorHistory() {
  renderVendorHistGrid();
  if (selectedVendorHistId) renderVendorHistDetail(selectedVendorHistId);
}

function renderVendorHistGrid() {
  const grid = document.getElementById('vendor-hist-grid'); if (!grid) return;
  const sorted = sortedVendors();
  if (!sorted.length) { grid.innerHTML = '<div class="empty-zone">등록된 공구사가 없어요</div>'; return; }
  grid.innerHTML = sorted.map(v => {
    const lastComm = S.comms.filter(c=>c.vendorId===v.id).sort((a,b)=>b.date.localeCompare(a.date))[0];
    const evCount  = S.events.filter(e=>e.vendorId===v.id).length;
    return `
    <div class="vendor-card ${selectedVendorHistId===v.id?'selected':''} ${v.paused?'paused':''}" onclick="selectVendorHist('${v.id}')">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap">
        <div class="vendor-name" style="font-size:13px;margin:0">${v.name}</div>
        <span class="badge ${v.paused?'badge-gray':'badge-green'}" style="font-size:10px">${v.paused?'보류':'활성'}</span>

        ${lastComm ? `최근 소통 ${fmtDate(lastComm.date)}` : '소통 없음'}
      </div>
      <div style="font-size:12px;color:var(--text-mid)">공구 ${evCount}건</div>
    </div>`;
  }).join('');
}

function selectVendorHist(vId) {
  const detail = document.getElementById('vendor-hist-detail');

    detail.style.display = 'none';

  selectedVendorHistId = vId;

function saveVendorEdit(id) {

function toggleVendorPaused(id) {
  const v = S.vendors.find(v=>v.id===id); if (!v) return;
  v.paused = !v.paused;
  save(); refreshVendorSelects(); renderVendorHistGrid(); renderVendorHistDetail(id); renderToday();
  toast(v.paused ? `"${v.name}" 보류 처리됨` : `"${v.name}" 활성화됨`);
}
function deleteVendorPermanent(id) {
  const v = S.vendors.find(v=>v.id===id); if (!v) return;
  if (!confirm(`"${v.name}" 공구사와 모든 이력을 영구 삭제합니다. 계속할까요?`)) return;
  const evIds = S.events.filter(e=>e.vendorId===id).map(e=>e.id);
  S.vendors = S.vendors.filter(v=>v.id!==id);
  S.events  = S.events.filter(e=>e.vendorId!==id);
  S.tasks   = S.tasks.filter(t=>t.vendorId!==id);
  S.comms   = S.comms.filter(c=>c.vendorId!==id);
  evIds.forEach(eid=>delete S.evtProgress[eid]);
  delete S.progress[id];
  selectedVendorHistId = null;
  const detail = document.getElementById('vendor-hist-detail');
  if (detail) detail.style.display = 'none';
  save(); refreshVendorSelects(); renderVendorHistGrid(); renderGonggu(); renderToday(); renderTaskList(); renderCommVendors();
  toast(`"${v.name}" 영구 삭제됨`);
}

// ══════════════ ④ 할 일 ══════════════
let taskFilterAssignee='all', archiveOpen=false;

function initTaskForm() {
  document.getElementById('task-date').value = todayStr();
  const vSel = document.getElementById('task-vendor');
  vSel.innerHTML = '<option value="">공구사 선택</option>' + S.vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('');
  vSel.addEventListener('change', ()=>{
    const evSel = document.getElementById('task-event');
    evSel.innerHTML = '<option value="">없음</option>' +
      S.events.filter(e=>e.vendorId===vSel.value).map(e=>`<option value="${e.id}">${e.title} (${evFmtDate(e)})</option>`).join('');
  });
  document.getElementById('btn-add-task').addEventListener('click', addTask);
  document.getElementById('task-content').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
  document.getElementById('archive-toggle').addEventListener('click', ()=>{
    archiveOpen=!archiveOpen;
    document.getElementById('archive-toggle').textContent=(archiveOpen?'▼':'▶')+' 보관함 보기';
    document.getElementById('archive-list').classList.toggle('open',archiveOpen);
    renderArchive();
  });
}

function buildTaskFilters() {
  const el = document.getElementById('task-filters');
  const assignees = ['채원', '대표님'];
  el.innerHTML = `<button class="filter-btn ${taskFilterAssignee==='all'?'active':''}" data-assignee="all">전체</button>` +
    assignees.map(a=>`<button class="filter-btn ${taskFilterAssignee===a?'active':''}" data-assignee="${a}">${a}</button>`).join('') +
    `<button class="filter-btn ${taskFilterAssignee==='none'?'active':''}" data-assignee="none">미지정</button>`;
  el.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ taskFilterAssignee=btn.dataset.assignee; buildTaskFilters(); renderTaskList(); });
  });
}

function renderTaskList() {
  const el = document.getElementById('task-list');
  let tasks = S.tasks.filter(t=>!t.archived&&(taskFilterAssignee==='all'||(taskFilterAssignee==='none'?!t.assignee:t.assignee===taskFilterAssignee)));
  tasks.sort((a,b)=>{ if(a.done!==b.done)return a.done?1:-1; return 0; });
  if (!tasks.length) { el.innerHTML='<div style="color:var(--text-light);font-size:13px;padding:16px;text-align:center">할 일이 없습니다</div>'; return; }
  el.innerHTML = tasks.map(taskItemHtml).join('');
}

function taskItemHtml(t) {
  const ev = t.eventId ? eventById(t.eventId) : null;
  const lc = t.followUpFromCommId ? commById(t.followUpFromCommId) : null;
  return `
  <div class="task-item ${t.done?'done-item':''}" id="task-item-${t.id}">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskDone('${t.id}',this.checked)">
    <div class="task-item-body">
      <div class="task-item-content ${t.done?'done-text':''}">${t.content}</div>
      <div class="task-item-meta">
        ${t.dueDate?`<span style="font-size:11px;color:var(--text-light)">${fmtDate(t.dueDate)}</span>`:''}
        ${ev?`<span class="task-event-tag">${ev.title}</span>`:`<span class="today-vendor-tag">${vendorName(t.vendorId)}</span>`}
        ${t.assignee?`<span style="font-size:11px;padding:1px 6px;border-radius:4px;background:var(--brown-light);color:var(--brown);font-weight:600">👤 ${t.assignee}</span>`:''}
      </div>
    </div>
    <div class="task-item-actions">
      ${!t.done?`<button class="btn btn-sm btn-done" onclick="toggleTaskDone('${t.id}',true)">완료</button>`:''}
      <button class="btn btn-sm btn-outline" onclick="openTaskEdit('${t.id}')">수정</button>
    </div>
  </div>`;
}

function renderArchive() {
  const el = document.getElementById('archive-list');
  const archived = S.tasks.filter(t=>t.archived);
  if (!archived.length) { el.innerHTML='<div style="color:var(--text-light);font-size:13px;padding:8px 0">보관된 항목 없음</div>'; return; }
  el.innerHTML = archived.map(t=>`
    <div class="task-item archived-item">
      <div class="task-item-body">
        <div class="task-item-content done-text">${t.content}</div>
        <div class="task-item-meta"><span class="today-vendor-tag">${vendorName(t.vendorId)}</span><span class="badge badge-gray">보관됨</span></div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="restoreTask('${t.id}')">복원</button>
    </div>`).join('');
}

function addTask() {
  const vendorId = document.getElementById('task-vendor').value;
  const eventId  = document.getElementById('task-event').value || null;
  const content  = document.getElementById('task-content').value.trim();
  const dueDate  = document.getElementById('task-date').value.trim() || null;
  const assignee = document.getElementById('task-assignee').value || null;
  if (!content) { toast('할 일 내용을 입력해 주세요'); return; }
  S.tasks.unshift({ id:genId('t'), vendorId, eventId, content, done:false, archived:false, isDefault:false, createdAt:todayStr(), dueDate, followUpFromCommId:null, assignee });
  save(); document.getElementById('task-content').value=''; document.getElementById('task-date').value=todayStr(); document.getElementById('task-assignee').value='';
  renderTaskList(); renderToday(); renderEventBars(); toast('할 일이 추가되었습니다');
}

function toggleTaskDone(id, checked) {
  const t = S.tasks.find(t=>t.id===id); if(!t) return;
  t.done=checked;
  if (checked) t.archived=true;
  save(); renderTaskList(); renderToday();
  if (selectedGongguId) renderGongguDetail(selectedGongguId);
  if (_openGongguDropdown) renderGongguDetailInline(_openGongguDropdown, document.getElementById('today-gonggu-dropdown'));
}

function archiveTask(id) {
  const t=S.tasks.find(t=>t.id===id); if(!t) return;
  t.archived=true; save(); renderTaskList(); renderToday();
  if (archiveOpen) renderArchive(); toast('보관함으로 이동했습니다');
}

function restoreTask(id) {
  const t=S.tasks.find(t=>t.id===id); if(!t) return;
  t.archived=false; save(); renderTaskList(); renderArchive(); toast('목록으로 복원했습니다');
}

const INSTA_TYPE_COLOR = { 피드:'badge-brown', 스토리:'badge-orange', 릴스:'badge-red' };
let selectedInstaEvId = null;

function initInstaForm() {
  renderInstaEvents();
}

function renderInstaEvents() {
  const grid = document.getElementById('insta-event-grid'); if (!grid) return;
  const evs = [...S.events].sort((a, b) => {
    const lastA = S.insta.filter(p=>p.eventId===a.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    const lastB = S.insta.filter(p=>p.eventId===b.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    const da = lastA ? lastA.date : '0000-00-00';
    const db = lastB ? lastB.date : '0000-00-00';
    if (db !== da) return db.localeCompare(da);
    return evStart(b).localeCompare(evStart(a));
  });
  if (!evs.length) { grid.innerHTML = '<div class="empty-zone">등록된 공구가 없어요</div>'; return; }
  grid.innerHTML = evs.map(ev => {
    const isActive = evIsActive(ev);
    const posts = S.insta.filter(p => p.eventId === ev.id);
    const count = posts.length;
    const lastPost = posts.sort((a,b)=>b.date.localeCompare(a.date))[0];
    return `
    <div class="vendor-card ${selectedInstaEvId===ev.id?'selected':''} ${!isActive?'paused':''}" onclick="selectInstaEvent('${ev.id}')">
      <div class="vendor-name" style="font-size:13px;margin-bottom:6px">${ev.title}</div>
      <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
        <span class="today-vendor-tag">${vendorName(ev.vendorId)}</span>
        <span style="font-size:11px;color:var(--text-light)">${evFmtDate(ev)}</span>
      </div>
      <div style="font-size:12px;color:${count?'var(--brown)':'var(--text-light)'};font-weight:${count?'600':'400'}">
        📸 ${count ? `${count}건` : '없음'}
      </div>
      ${lastPost ? `<div style="font-size:11px;color:var(--text-light);margin-top:4px">최근 ${fmtDate(lastPost.date)}</div>` : ''}
    </div>`;
  }).join('');
}

function selectInstaEvent(evId) {
  const detail = document.getElementById('insta-event-detail');
  if (selectedInstaEvId === evId) {
    selectedInstaEvId = null;
    detail.style.display = 'none';
    renderInstaEvents();
    return;
  }
  selectedInstaEvId = evId;
  renderInstaEvents();
  detail.style.display = 'block';

function addInstaPost(evId) {
  const ev = S.events.find(e => e.id === evId); if (!ev) return;

  const type = document.getElementById(`insta-ev-type-${evId}`).value;

  document.getElementById(`insta-ev-url-${evId}`).value = '';
  document.getElementById(`insta-ev-memo-${evId}`).value = '';
  const postsEl = document.getElementById(`insta-ev-posts-${evId}`);

let selectedCommVendorId = null;

function initCommForm() {

  vSel.innerHTML = '<option value="">공구사 선택</option>' + S.vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('');

  });
  document.getElementById('comm-followup-check').addEventListener('change', function(){
    document.getElementById('followup-section').classList.toggle('open', this.checked);
  });
  document.getElementById('comm-newevent-check').addEventListener('change', function(){
    document.getElementById('newevent-section').classList.toggle('open', this.checked);

function renderCommFeed() {
  renderCommVendors();

function renderCommVendors() {
  const grid = document.getElementById('comm-vendor-grid'); if (!grid) return;
  const vendors = [...S.vendors].filter(v => S.comms.some(c=>c.vendorId===v.id));
  if (!vendors.length) {
    grid.innerHTML = '<div class="empty-zone">소통 기록이 없어요</div>';
    return;
  }
  const sorted = vendors.sort((a,b)=>{
    const la = S.comms.filter(c=>c.vendorId===a.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    const lb = S.comms.filter(c=>c.vendorId===b.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    return (lb ? lb.date : '0000-00-00').localeCompare(la ? la.date : '0000-00-00');
  });
  grid.innerHTML = sorted.map(v => {
    const comms   = S.comms.filter(c=>c.vendorId===v.id);
    const lastComm = comms.sort((a,b)=>b.date.localeCompare(a.date))[0];
    return `
    <div class="vendor-card ${selectedCommVendorId===v.id?'selected':''}" onclick="selectCommVendor('${v.id}')">
      <div class="vendor-name" style="font-size:13px;margin-bottom:8px">${v.name}</div>
      <div style="font-size:12px;color:var(--text-light);margin-bottom:4px">
        ${lastComm ? `최근 소통 ${fmtDate(lastComm.date)}` : '소통 없음'}
      </div>
      <div style="font-size:12px;color:var(--text-mid)">총 ${comms.length}건</div>
    </div>`;
  }).join('');
}

function selectCommVendor(vId) {

function addComm() {
  const vendorId = document.getElementById('comm-vendor').value;
  const type     = document.getElementById('comm-type').value;
  let eventId    = document.getElementById('comm-event').value || null;
  const content  = document.getElementById('comm-content').value.trim();
  const hasFollowup = document.getElementById('comm-followup-check').checked;
  const followupContent = document.getElementById('followup-content').value.trim();
  if (!vendorId) { toast('공구사를 선택해 주세요'); return; }
  if (!content)  { toast('소통 내용을 입력해 주세요'); return; }
  if (hasFollowup&&!followupContent) { toast('후속 할 일 내용을 입력해 주세요'); return; }

  const commId = genId('c');
  let followUpTaskId = null;
  if (hasFollowup) {
    const taskId = genId('t');
    S.tasks.unshift({ id:taskId, vendorId, eventId, content:followupContent, done:false, archived:false, isDefault:false, createdAt:todayStr(), followUpFromCommId:commId });
    followUpTaskId = taskId;
  }
  // 새 공구 일정 생성
  const hasNewEvent = document.getElementById('comm-newevent-check').checked;
  const newEventDate    = document.getElementById('newevent-date').value.trim();
  const newEventEndDate = document.getElementById('newevent-enddate').value.trim() || null;
  const newEventTitle   = document.getElementById('newevent-title').value.trim();
  if (hasNewEvent) {
    if (!newEventDate || !/^\d{4}-\d{2}-\d{2}$/.test(newEventDate)) { toast('일정 시작 날짜를 입력해 주세요 (예: 0307)'); return; }
    if (!newEventTitle) { toast('일정 제목을 입력해 주세요'); return; }
    const newEvId = genId('evt');
    S.events.push({ id: newEvId, vendorId, startDate: newEventDate, endDate: newEventEndDate, title: newEventTitle });
    eventId = newEvId;
  }

  const commDate = document.getElementById('comm-date').value.trim() || todayStr();
  document.getElementById('comm-date').value = todayStr();
  S.comms.unshift({ id:commId, vendorId, eventId, date:commDate, type, content, followUpTaskId });
  save();

  document.getElementById('comm-vendor').value='';
  document.getElementById('comm-content').value='';
  document.getElementById('comm-followup-check').checked=false;
  document.getElementById('followup-content').value='';
  document.getElementById('followup-section').classList.remove('open');
  document.getElementById('comm-newevent-check').checked=false;
  document.getElementById('newevent-date').value='';
  document.getElementById('newevent-enddate').value='';
  document.getElementById('newevent-title').value='';
  document.getElementById('newevent-section').classList.remove('open');
  document.getElementById('comm-event').innerHTML='<option value="">없음</option>';

  renderCommFeed(); renderTaskList(); renderToday(); renderEventBars(); renderCalendar();
  const msgs = ['소통 기록이 추가되었습니다', hasFollowup && '할 일 생성됨', hasNewEvent && '공구 일정 등록됨'].filter(Boolean);
  toast(msgs.join(' · '));
}

function addEvent() {
  const vendorInput = document.getElementById('event-vendor').value.trim();
  const startDate   = document.getElementById('event-startdate').value.trim();
  const endDate     = document.getElementById('event-enddate').value.trim() || null;
  const title       = document.getElementById('event-title').value.trim();
  if (!vendorInput) { toast('공구사를 입력해 주세요'); return; }
  if (!startDate || !/^\d{4}-\d{2}-\d{2}$/.test(startDate)) { toast('시작 날짜를 입력해 주세요 (예: 0307)'); return; }
  if (endDate && !/^\d{4}-\d{2}-\d{2}$/.test(endDate)) { toast('종료 날짜를 확인해 주세요 (예: 0322)'); return; }
  if (!title) { toast('일정 제목을 입력해 주세요'); return; }
  let vendor = S.vendors.find(v => v.name === vendorInput);
  const isNew = !vendor;
  if (isNew) {
    vendor = { id: genId('v'), name: vendorInput, paused: false };
    S.vendors.push(vendor);
    refreshVendorSelects();
    renderVendorHistory();
  }
  S.events.push({ id: genId('evt'), vendorId: vendor.id, startDate, endDate, title });
  save();
  document.getElementById('event-vendor').value = '';
  document.getElementById('event-startdate').value = '';
  document.getElementById('event-enddate').value = '';
  document.getElementById('event-title').value = '';
  renderCalendar(); renderEventBars(); renderToday();
  toast(isNew ? `"${vendorInput}" 공구사 등록 후 일정이 추가되었습니다` : '일정이 추가되었습니다');
}

// ══════════════ 헤더 날짜 ══════════════
function renderHeaderDate() {
  const d=new Date();
  const dows=['일','월','화','수','목','금','토'];
  document.getElementById('header-date').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${dows[d.getDay()]})`;
}

// ══════════════ 초기화 ══════════════
async function init() {
  document.getElementById('loading-overlay').style.display = 'flex';
  await load();
  document.getElementById('loading-overlay').style.display = 'none';
  renderHeaderDate();
  initTaskForm();
  initCommForm();
  initEventForm();
  initInstaForm();
  buildTaskFilters();
  renderToday();
  renderGonggu();
  renderVendorHistGrid();
  renderTaskList();
  renderCommVendors();

  document.getElementById('btn-add-vendor').addEventListener('click', () => {
    const nameEl = document.getElementById('new-vendor-name');
    const name = nameEl.value.trim();
    if (!name) { toast('공구사 이름을 입력해 주세요'); return; }
    if (S.vendors.some(v => v.name === name)) { toast('이미 등록된 공구사입니다'); return; }
    const id = genId('v');
    S.vendors.push({ id, name, paused: false });
    nameEl.value = '';
    save(); refreshVendorSelects(); renderVendorHistGrid();
    toast(`"${name}" 추가됨`);
  });
}

init();
</script>
</body>
</html>

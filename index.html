<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>달콤수학 공구 관리 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream: #FFFDF7;
  --cream2: #FFF8E6;
  --yellow: #F5C842;
  --yellow-light: #FEF4C0;
  --brown: #7B5C3E;
  --brown-light: #F2EAE0;
  --orange: #F08030;
  --orange-light: #FDE8D0;
  --red: #E05040;
  --red-light: #FCE4E0;
  --green: #4CAF50;
  --green-light: #E8F5E9;
  --gray: #9E9E9E;
  --gray-light: #F5F5F0;
  --text-dark: #3D2B1F;
  --text-mid: #6B4F3A;
  --text-light: #9E8070;
  --border: #E8DDD0;
  --shadow: 0 2px 8px rgba(123,92,62,0.10);
  --shadow-md: 0 4px 16px rgba(123,92,62,0.14);
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ─── 헤더 ─── */
#app-header {
  background: var(--brown);
  color: #fff;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
#app-header h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
#header-date { font-size: 13px; opacity: 0.85; }


/* ─── 메인 레이아웃 ─── */
#app-body { display: flex; flex: 1; min-height: 0; }

/* ─── 왼쪽 목차 ─── */
#sidebar {
  width: 180px;
  min-width: 180px;
  background: var(--brown-light);
  border-right: 1px solid var(--border);
  padding: 20px 0;
  position: sticky;
  top: 53px;
  height: calc(100vh - 53px);
  overflow-y: auto;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 11px 20px;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.18s;
}
.nav-item:hover { background: rgba(245,200,66,0.18); color: var(--brown); }
.nav-item.active { background: var(--yellow-light); color: var(--brown); font-weight: 700; border-left-color: var(--yellow); }
.nav-icon { font-size: 16px; }

/* ─── 콘텐츠 ─── */
#content { flex: 1; padding: 28px; overflow-y: auto; max-width: 980px; }
.section { display: none; }
.section.active { display: block; }
.section-title { font-size: 20px; font-weight: 700; color: var(--brown); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

/* ─── 카드 ─── */
.card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }

/* ─── 배지 ─── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600; }
.badge-yellow { background: var(--yellow-light); color: #7B6010; }
.badge-brown  { background: var(--brown-light);  color: var(--brown); }
.badge-orange { background: var(--orange-light); color: #A04010; }
.badge-red    { background: var(--red-light);    color: var(--red); }
.badge-green  { background: var(--green-light);  color: #2E7D32; }
.badge-gray   { background: var(--gray-light);   color: var(--gray); }
.badge-green  { background: var(--green-light);  color: #2E7D32; font-weight: 700; }

/* ─── 버튼 ─── */
.btn { display: inline-flex; align-items: center; gap: 4px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; font-family: inherit; }
.btn-primary { background: var(--yellow); color: var(--brown); }
.btn-primary:hover { background: #E6B820; }
.btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text-mid); }
.btn-outline:hover { border-color: var(--brown); color: var(--brown); }
.btn-sm { padding: 4px 10px; font-size: 12px; }
.btn-archive { background: var(--gray-light); color: var(--gray); }
.btn-archive:hover { background: #E0E0D8; color: #666; }
.btn-done { background: var(--green-light); color: #2E7D32; }
.btn-done:hover { background: #C8E6C9; }

/* ─── 폼 ─── */
.form-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
.form-group { display: flex; flex-direction: column; gap: 4px; }
.form-group label { font-size: 12px; font-weight: 600; color: var(--text-mid); }
select, input[type="text"], textarea {
  font-family: inherit; font-size: 13px; padding: 8px 10px;
  border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  background: var(--cream); color: var(--text-dark); outline: none; transition: border-color 0.15s;
}
select:focus, input[type="text"]:focus, textarea:focus { border-color: var(--yellow); }
textarea { resize: vertical; min-height: 60px; }



/* ─── 토스트 ─── */
#toast { position: fixed; bottom: 28px; right: 28px; background: var(--brown); color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; box-shadow: var(--shadow-md); z-index: 9999; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
#toast.show { transform: translateY(0); opacity: 1; }

/* ─── ① 오늘 확인 ─── */
.today-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.today-zone { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.today-zone-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid; display: flex; align-items: center; gap: 6px; }
.zone-today .today-zone-title { border-color: var(--red); color: var(--red); }
.zone-week  .today-zone-title { border-color: var(--orange); color: var(--orange); }
.zone-issue .today-zone-title { border-color: var(--brown); color: var(--brown); }
.today-task-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--cream2); font-size: 13px; }
.today-task-item:last-child { border-bottom: none; }
.today-task-item input[type="checkbox"] { margin-top: 2px; accent-color: var(--brown); }
.today-task-text { flex: 1; line-height: 1.4; }
.today-task-text.done { text-decoration: line-through; color: var(--text-light); }
.today-vendor-tag { font-size: 11px; font-weight: 600; color: var(--brown); background: var(--brown-light); padding: 1px 6px; border-radius: 4px; white-space: nowrap; }
.empty-zone { color: var(--text-light); font-size: 13px; text-align: center; padding: 16px 0; }

/* ─── ② 공구 일정 ─── */
.schedule-layout { display: grid; grid-template-columns: 280px 1fr; gap: 20px; }
.calendar-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
.cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-header button { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--brown); padding: 4px 8px; border-radius: 6px; }
.cal-header button:hover { background: var(--brown-light); }
.cal-month { font-size: 15px; font-weight: 700; color: var(--brown); }
.cal-grid { display: block; }
.cal-week { display: flex; margin-bottom: 2px; }
.cal-dow { flex: 1; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-light); padding: 4px 0; }
.cal-day { flex: 1; text-align: center; padding: 6px 2px; font-size: 12px; cursor: default; border-radius: 6px; color: var(--text-dark); }
.cal-day:not(.range-fill):hover { background: var(--cream2); }
.cal-day.range-fill { background: var(--orange-light); border-radius: 0; cursor: pointer; }
.cal-day.range-fill:hover { background: #FDDBB0; }
.cal-day.range-fill.range-start { border-top-left-radius: 8px; border-bottom-left-radius: 8px; }
.cal-day.range-fill.range-end   { border-top-right-radius: 8px; border-bottom-right-radius: 8px; }

/* ─── 캘린더 팝업 ─── */
#cal-popup-overlay { display:none; position:fixed; inset:0; z-index:200; background:rgba(61,43,31,0.25); }
#cal-popup {
  display:none; position:fixed; z-index:201;
  top:50%; left:50%; transform:translate(-50%,-50%);
  background:#fff; border-radius:var(--radius); padding:22px;
  min-width:300px; max-width:400px; width:90%;
  box-shadow:0 8px 32px rgba(123,92,62,0.22); border:1px solid var(--border);
  max-height:80vh; overflow-y:auto;
}
.cal-popup-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.cal-popup-date { font-size:16px; font-weight:700; color:var(--brown); }
.cal-popup-close { background:none; border:none; cursor:pointer; font-size:20px; color:var(--text-light); line-height:1; padding:0 2px; }
.cal-popup-close:hover { color:var(--brown); }
.cal-popup-event { padding:12px; background:var(--cream); border-radius:var(--radius-sm); margin-bottom:8px; border:1px solid var(--border); }
.cal-popup-event:last-child { margin-bottom:0; }
.cal-day.today { background: var(--yellow); color: var(--brown); font-weight: 700; }
.cal-day.has-event:not(.today) { background: var(--orange-light); }
.cal-day.other-month { color: var(--text-light); }
.cal-day.sunday { color: var(--red); }
.cal-day.saturday { color: #5080C0; }
.event-list { display: flex; flex-direction: column; gap: 12px; }
.event-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
.event-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.event-title { font-size: 14px; font-weight: 600; }
.event-meta { font-size: 12px; color: var(--text-light); display: flex; gap: 10px; margin-bottom: 8px; }
.event-links { display: flex; gap: 8px; flex-wrap: wrap; }
.event-link-btn { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 6px; cursor: pointer; border: none; background: var(--cream2); color: var(--text-mid); font-family: inherit; transition: background 0.15s; }
.event-link-btn:hover { background: var(--yellow-light); }
.event-linked-items { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: none; font-size: 12px; }
.event-linked-items.open { display: block; }
.linked-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; color: var(--text-mid); }
.linked-item::before { content: '•'; color: var(--yellow); }

/* ─── ③ 공구사 현황 ─── */
.vendor-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px; margin-bottom: 20px; }
.vendor-card { background: #fff; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; cursor: pointer; box-shadow: var(--shadow); transition: all 0.18s; }
.vendor-card:hover { border-color: var(--yellow); box-shadow: var(--shadow-md); }
.vendor-card.selected { border-color: var(--orange); box-shadow: var(--shadow-md); }
.vendor-card.paused { opacity: 0.55; background: var(--gray-light); }
.vendor-card.paused .vendor-name { color: var(--gray); }
.vendor-name { font-size: 15px; font-weight: 700; color: var(--brown); margin-bottom: 8px; }
.progress-bar-wrap { background: var(--cream2); border-radius: 6px; height: 8px; overflow: hidden; margin-bottom: 6px; }
.progress-bar-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--yellow), var(--orange)); transition: width 0.4s; }
.progress-label { font-size: 12px; color: var(--text-light); }
#vendor-detail-panel { background: #fff; border: 1.5px solid var(--orange); border-radius: var(--radius); padding: 22px; box-shadow: var(--shadow-md); display: none; }
#vendor-detail-panel.open { display: block; }
.detail-panel-title { font-size: 17px; font-weight: 700; color: var(--brown); margin-bottom: 18px; }
.detail-section { margin-bottom: 18px; }
.detail-section-label { font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.step-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 3px 0; }
.step-item input[type="checkbox"] { accent-color: var(--brown); width: 15px; height: 15px; }
.step-item.checked span { text-decoration: line-through; color: var(--text-light); }
.detail-comm-item { font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--cream2); color: var(--text-mid); }
.detail-comm-item:last-child { border-bottom: none; }
.detail-task-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 5px 0; }
.detail-task-item input[type="checkbox"] { accent-color: var(--brown); }

/* ─── ④ 할 일 ─── */
.task-add-form { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; box-shadow: var(--shadow); }
.task-add-form h3 { font-size: 14px; font-weight: 700; color: var(--brown); margin-bottom: 14px; }
.task-filters { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn { padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border); background: var(--cream); font-size: 12px; font-weight: 600; color: var(--text-mid); cursor: pointer; font-family: inherit; transition: all 0.15s; }
.filter-btn.active { background: var(--yellow-light); border-color: var(--yellow); color: var(--brown); }
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-item { display: flex; align-items: center; gap: 10px; background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; box-shadow: var(--shadow); transition: opacity 0.2s; }
.task-item.done-item { opacity: 0.55; }
.task-item.archived-item { opacity: 0.4; background: var(--gray-light); }
.task-item input[type="checkbox"] { accent-color: var(--brown); width: 16px; height: 16px; flex-shrink: 0; }
.task-item-body { flex: 1; min-width: 0; }
.task-item-content { font-size: 13px; font-weight: 500; line-height: 1.4; }
.task-item-content.done-text { text-decoration: line-through; color: var(--text-light); }
.task-item-meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.task-event-tag { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--orange-light); color: #A04010; font-weight: 600; }
.task-comm-link { font-size: 11px; padding: 1px 6px; border-radius: 4px; background: var(--cream2); color: var(--text-mid); font-weight: 500; cursor: pointer; }
.task-comm-link:hover { background: var(--brown-light); }
.task-item-actions { display: flex; gap: 6px; flex-shrink: 0; }
.archive-section { margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 14px; }
.archive-toggle { font-size: 12px; font-weight: 600; color: var(--text-light); cursor: pointer; background: none; border: none; font-family: inherit; display: flex; align-items: center; gap: 4px; padding: 0; }
.archive-toggle:hover { color: var(--brown); }
.archive-list { margin-top: 10px; display: none; }
.archive-list.open { display: flex; flex-direction: column; gap: 8px; }

/* ─── ⑤ 소통 기록 ─── */
.comm-add-form { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 20px; box-shadow: var(--shadow); }
.comm-add-form h3 { font-size: 14px; font-weight: 700; color: var(--brown); margin-bottom: 14px; }
.followup-section { background: var(--cream2); border-radius: var(--radius-sm); padding: 12px; margin-top: 10px; display: none; }
.followup-section.open { display: block; }
.followup-label { font-size: 12px; font-weight: 600; color: var(--brown); margin-bottom: 8px; }
.comm-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.comm-feed { display: flex; flex-direction: column; gap: 10px; }
.comm-item { background: #fff; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; box-shadow: var(--shadow); }
.comm-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
.comm-item-content { font-size: 13px; color: var(--text-dark); line-height: 1.5; }
.comm-item-followup { margin-top: 8px; padding: 6px 10px; background: var(--cream2); border-radius: 6px; font-size: 12px; color: var(--brown); cursor: pointer; }
.comm-item-followup:hover { background: var(--yellow-light); }
.checkbox-label { display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text-mid); cursor: pointer; }
.checkbox-label input { accent-color: var(--brown); width: 15px; height: 15px; }

@media (max-width: 900px) {
  .today-grid { grid-template-columns: 1fr; }
  .schedule-layout { grid-template-columns: 1fr; }
}
@media (max-width: 768px) {
  #sidebar { width: 54px; min-width: 54px; }
  .nav-item span:not(.nav-icon) { display: none; }
  #content { padding: 16px; }
}
</style>
</head>
<body>

<header id="app-header">
  <h1>달콤수학 공구 관리</h1>
  <div id="header-date"></div>
</header>

<div id="app-body">
  <nav id="sidebar">
    <div class="nav-item active" data-section="today"><span class="nav-icon">📋</span><span>오늘 확인</span></div>
    <div class="nav-item" data-section="schedule"><span class="nav-icon">📅</span><span>공구 일정</span></div>
    <div class="nav-item" data-section="gonggu"><span class="nav-icon">📊</span><span>공구 현황</span></div>
    <div class="nav-item" data-section="vendorhist"><span class="nav-icon">🏪</span><span>공구사 현황</span></div>
    <div class="nav-item" data-section="tasks"><span class="nav-icon">✅</span><span>할 일</span></div>
    <div class="nav-item" data-section="comms"><span class="nav-icon">💬</span><span>소통 기록</span></div>
  </nav>

  <main id="content">

    <!-- ① 오늘 확인 -->
    <section id="section-today" class="section active">
      <div class="section-title">📋 오늘 확인</div>
      <div id="today-gonggu-bar"></div>
      <div class="today-grid">
        <div class="today-zone zone-today">
          <div class="today-zone-title">오늘 처리</div>
          <div id="zone-today-list"></div>
        </div>
        <div class="today-zone zone-week">
          <div class="today-zone-title">이번 주 처리</div>
          <div id="zone-week-list"></div>
        </div>
        <div class="today-zone zone-issue">
          <div class="today-zone-title">최근 소통</div>
          <div id="zone-issue-list"></div>
        </div>
      </div>
    </section>

    <!-- ② 공구 일정 -->
    <section id="section-schedule" class="section">
      <div class="section-title">📅 공구 일정</div>
      <div class="task-add-form" style="margin-bottom:20px">
        <h3>일정 추가</h3>
        <div class="form-row">
          <div class="form-group">
            <label>공구사</label>
            <select id="event-vendor"></select>
          </div>
          <div class="form-group">
            <label>시작 날짜</label>
            <input type="text" id="event-startdate" placeholder="YYYY-MM-DD">
          </div>
          <div class="form-group">
            <label>종료 날짜 (선택)</label>
            <input type="text" id="event-enddate" placeholder="YYYY-MM-DD">
          </div>
          <div class="form-group" style="flex:1">
            <label>일정 제목</label>
            <input type="text" id="event-title" placeholder="예: 낼나 타임타이머 공구">
          </div>
          <div class="form-group" style="justify-content:flex-end">
            <label style="visibility:hidden">버튼</label>
            <button class="btn btn-primary" id="btn-add-event">추가</button>
          </div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:260px 1fr;gap:20px;align-items:start">
        <div class="calendar-card">
          <div class="cal-header">
            <button id="cal-prev">‹</button>
            <div class="cal-month" id="cal-month-label"></div>
            <button id="cal-next">›</button>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </div>
        <div id="event-bars"></div>
      </div>
    </section>

    <!-- ③ 공구 현황 (공구별 단계 관리) -->
    <section id="section-gonggu" class="section">
      <div class="section-title">📊 공구 현황</div>
      <div class="vendor-grid" id="gonggu-grid"></div>
      <div id="gonggu-detail-panel" class="card" style="display:none;margin-top:20px;border:1.5px solid var(--orange)"></div>
    </section>

    <!-- ④ 공구사 현황 (누적 이력) -->
    <section id="section-vendorhist" class="section">
      <div class="section-title">🏪 공구사 현황</div>
      <div id="vendor-hist-list"></div>
    </section>

    <!-- ④ 할 일 -->
    <section id="section-tasks" class="section">
      <div class="section-title">✅ 할 일</div>

  migrateVendors();
  migrateEvents();
  migrateProgress();
  migrateBaobab();

function migrateProgress() {
  S.vendors.forEach(v => {
    const p = S.progress[v.id];
    if (!p || JSON.stringify(p.steps) !== JSON.stringify(PROGRESS_STEPS)) {
      // 기존 체크 수만큼 앞에서부터 순서대로 적용
      const checkedCount = p ? p.checked.filter(Boolean).length : 0;
      S.progress[v.id] = {
        steps:   PROGRESS_STEPS,
        checked: PROGRESS_STEPS.map((_, i) => i < checkedCount),
      };
    }
  });
}

  // evt-004 비상 공구 일정 8/26~8/30으로 수정
  const ev004 = S.events.find(e => e.id === 'evt-004');
  if (ev004) { ev004.startDate = '2026-08-26'; ev004.endDate = '2026-08-30'; }

  // evt-006, evt-007 → evt-001으로 통합 후 삭제
  ['evt-006', 'evt-007'].forEach(id => {

  // 기존 evtProgress에서 evt-006, evt-007 제거
  delete S.evtProgress['evt-006'];
  delete S.evtProgress['evt-007'];
}
function migrateEvents() {
  // date → startDate 변환
  S.events = S.events.map(e => ({
    ...e,
    startDate: e.startDate || e.date || '',
    endDate:   'endDate' in e ? e.endDate : null,
  }));
  // 기존 시작/종료 쌍 통합
  [
    { startId:'evt-008', endId:'evt-009', endDate:'2026-07-14', title:'낼나 타임타이머 공구' },
    { startId:'evt-010', endId:'evt-011', endDate:'2026-07-24', title:'칼타공기 공구' },
    { startId:'evt-012', endId:'evt-013', endDate:'2026-10-05', title:'일프로 연산 공구' },
  ].forEach(({ startId, endId, endDate, title }) => {
    const st = S.events.find(e => e.id === startId);
    if (st && !st.endDate) { st.endDate = endDate; st.title = title; }

}

// ══════════════ 유틸 ══════════════
const TODAY = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();

function todayStr() {
  return `${TODAY.getFullYear()}-${String(TODAY.getMonth()+1).padStart(2,'0')}-${String(TODAY.getDate()).padStart(2,'0')}`;
}
function dday(ds)   { const d = new Date(ds); d.setHours(0,0,0,0); return Math.round((d-TODAY)/86400000); }
function ddayLabel(ds) { const n=dday(ds); return n===0?'D-Day':n>0?`D-${n}`:`D+${Math.abs(n)}`; }
function fmtDate(ds) { const [,m,d]=ds.split('-'); return `${m}/${d}`; }
function parseSmartDate(val) {
  val = val.trim();
  if (!val) return val;
  if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
  const y = new Date().getFullYear();
  if (/^\d{4}$/.test(val)) return `${y}-${val.slice(0,2)}-${val.slice(2,4)}`;
  if (/^\d{8}$/.test(val)) return `${val.slice(0,4)}-${val.slice(4,6)}-${val.slice(6,8)}`;
  return val;
}
function vendorName(id) { const v=S.vendors.find(v=>v.id===id); return v?v.name:id; }

// ── 이벤트 범위 헬퍼 ──
function evStart(e)  { return e.startDate || e.date || ''; }
function evEnd(e)    { return e.endDate || null; }
function evIsActive(e) {
  const end = evEnd(e);
  return end ? dday(end) >= 0 : dday(evStart(e)) >= 0;
}
function evDdayLabel(e) {
  const end = evEnd(e), start = evStart(e);
  if (end) {
    if (dday(start) > 0) return `D-${dday(start)}`;
    if (dday(end) >= 0)  return '진행중';
    return '종료';
  }
  return ddayLabel(start);
}
function evBadgeCls(e) {
  const end = evEnd(e), start = evStart(e);
  if (end) {
    const sd = dday(start);
    if (sd > 0) return sd <= 7 ? 'badge-orange' : 'badge-brown';
    return 'badge-green';
  }
  const n = dday(start);
  return n===0?'badge-red':n<0?'badge-gray':n<=7?'badge-orange':'badge-brown';
}
function evFmtDate(e) {
  const end = evEnd(e);
  return end ? `${fmtDate(evStart(e))}~${fmtDate(end)}` : fmtDate(evStart(e));
}
function evRangeBar(e) {
  const end = evEnd(e), start = evStart(e);
  if (!end) return '';
  const sd = new Date(start), ed = new Date(end);
  const total   = Math.max((ed - sd) / 86400000, 1);
  const elapsed = Math.min(Math.max((TODAY - sd) / 86400000, 0), total);
  const pct     = Math.round(elapsed / total * 100);
  return `<div style="margin:8px 0 2px">
    <div style="height:8px;background:var(--cream2);border-radius:4px;overflow:hidden">
      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--yellow),var(--orange));border-radius:4px"></div>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-light);margin-top:2px">
      <span>${fmtDate(start)}</span><span>${fmtDate(end)}</span>
    </div>
  </div>`;
}
function buildEvDateSet() {
  const dates = new Set();
  S.events.forEach(e => {
    const start = evStart(e), end = evEnd(e);
    if (!end) { dates.add(start); return; }
    let cur = new Date(start);
    const last = new Date(end);
    while (cur <= last) { dates.add(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
  });
  return dates;
}
function eventById(id)  { return S.events.find(e=>e.id===id); }
function getEvProg(evId) {
  if (!S.evtProgress[evId]) S.evtProgress[evId] = { checked: new Array(8).fill(false), links: [] };
  if (!S.evtProgress[evId].links) S.evtProgress[evId].links = [];
  return S.evtProgress[evId];
}
function taskById(id)   { return S.tasks.find(t=>t.id===id); }
function commById(id)   { return S.comms.find(c=>c.id===id); }
function genId(p)       { return p+'-'+Date.now()+'-'+Math.floor(Math.random()*1000); }
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2500);
}
function typeColor(t) {
  return {일정:'badge-yellow',품목:'badge-brown',전달:'badge-red'}[t]||'badge-gray';
}

// ══════════════ ② 공구 일정 ══════════════
let calYear = TODAY.getFullYear(), calMonth = TODAY.getMonth();

function buildRangeMap() {
  const map = {};
  S.events.forEach(e => {
    const s = evStart(e), en = evEnd(e) || evStart(e);
    let cur = new Date(s + 'T00:00:00'), last = new Date(en + 'T00:00:00');
    while (cur <= last) {
      const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
      if (!map[ds]) map[ds] = { isStart: false, isEnd: false };
      if (ds === s)  map[ds].isStart = true;
      if (ds === en) map[ds].isEnd   = true;
      cur.setDate(cur.getDate()+1);
    }
  });
  return map;
}

function renderCalendar() {
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('cal-month-label').textContent = `${calYear}년 ${calMonth+1}월`;
  const grid  = document.getElementById('cal-grid');
  const dows  = ['일','월','화','수','목','금','토'];
  const first = new Date(calYear, calMonth, 1);
  const last  = new Date(calYear, calMonth+1, 0);
  const rmap  = buildRangeMap();

  // DOW 헤더
  let html = `<div class="cal-week">${dows.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>`;

  // 전체 날짜 배열 (앞뒤 패딩 포함)
  const cells = [];
  for (let i=0; i<first.getDay(); i++) cells.push(null);
  for (let d=1; d<=last.getDate(); d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  for (let w=0; w<cells.length/7; w++) {
    html += '<div class="cal-week">';
    for (let i=0; i<7; i++) {
      const d   = cells[w*7+i];
      const dow = i; // 0=일,6=토
      if (d === null) { html += '<div class="cal-day other-month" style="flex:1"></div>'; continue; }
      const ds  = `${calYear}-${pad(calMonth+1)}-${pad(d)}`;
      const ri  = rmap[ds];
      const isToday = ds === todayStr();
      const cls = ['cal-day'];
      if (isToday) {
        cls.push('today');
      } else if (ri) {
        cls.push('range-fill');
        if (ri.isStart || i === 0) cls.push('range-start');
        if (ri.isEnd   || i === 6) cls.push('range-end');
      }
      if (dow === 0) cls.push('sunday');
      if (dow === 6) cls.push('saturday');
      const click = ri || isToday ? `onclick="calDayClick('${ds}')"` : '';
      html += `<div class="${cls.join(' ')}" style="flex:1" ${click}>${d}</div>`;
    }
    html += '</div>';
  }
  grid.innerHTML = html;
  renderEventBars();
}

        <span class="today-vendor-tag">${vendorName(ev.vendorId)}</span>
        <span style="font-size:11px;color:var(--text-light)">${evFmtDate(ev)}</span>
        <span class="badge ${active?evBadgeCls(ev):'badge-gray'}" style="font-size:10px">${active?evDdayLabel(ev):'종료'}</span>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label" style="margin-top:4px">${pct}% · ${done}/8단계</div>
    </div>`;
  }).join('');
}

function selectGonggu(id) {
  const panel = document.getElementById('gonggu-detail-panel');
  if (selectedGongguId === id) {
    selectedGongguId = null;
    panel.style.display = 'none';
    renderGonggu(); return;
  }
  selectedGongguId = id;
  renderGonggu();
  renderGongguDetail(id);
}

function renderGongguDetail(evId) {

  const panel = document.getElementById('gonggu-detail-panel');
  const rTasks = S.tasks.filter(t=>t.eventId===evId&&!t.done&&!t.archived);

  panel.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
      <div>
        <div class="detail-panel-title" style="margin-bottom:4px">${ev.title}</div>
        <div style="font-size:13px;color:var(--text-mid);display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <span class="today-vendor-tag">${vendorName(ev.vendorId)}</span>
          <span>${evFmtDate(ev)}</span>
          <span class="badge ${evBadgeCls(ev)}">${evDdayLabel(ev)}</span>
        </div>
      </div>
      <button onclick="selectGonggu('${evId}')" style="background:none;border:none;cursor:pointer;font-size:18px;color:var(--text-light)">✕</button>
    </div>
    <div class="detail-section">
      <div class="detail-section-label">진행 단계</div>
      <div class="progress-bar-wrap" style="height:10px;margin-bottom:6px"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <div class="progress-label" style="margin-bottom:12px">${pct}% 완료 (${done}/8단계)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 12px">
        ${PROGRESS_STEPS.map((s,i)=>`
          <label class="step-item ${prog.checked[i]?'checked':''}">
            <input type="checkbox" ${prog.checked[i]?'checked':''} onchange="toggleEvStep('${evId}',${i},this.checked)">
            <span>${s}</span>
          </label>`).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px">
      <div class="detail-section">
        <div class="detail-section-label">남은 할 일</div>
        ${rTasks.length
          ? rTasks.map(t=>`<div class="detail-task-item"><input type="checkbox" onchange="toggleTaskDone('${t.id}',this.checked)"><span style="font-size:13px">${t.content}</span></div>`).join('')
          : '<div style="font-size:13px;color:var(--text-light)">없음</div>'}
      </div>
      <div class="detail-section">
        <div class="detail-section-label">최근 소통</div>
        ${rComms.length
          ? rComms.map(c=>`<div class="detail-comm-item"><span class="badge ${typeColor(c.type)}">${c.type}</span> <span style="margin-left:4px">${fmtDate(c.date)} ${c.content.length>20?c.content.slice(0,20)+'…':c.content}</span></div>`).join('')
          : '<div style="font-size:13px;color:var(--text-light)">없음</div>'}
      </div>
    </div>
    <div class="detail-section" style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border)">
      <div class="detail-section-label" style="margin-bottom:10px">공구 상세정보 링크</div>
      <div id="ev-links-list-${evId}" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px">
        ${prog.links.length ? prog.links.map(lk=>`
          <div style="display:flex;align-items:center;gap:8px;background:var(--cream);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px">
            <a href="${lk.url}" target="_blank" style="flex:1;font-size:13px;color:var(--brown);font-weight:500;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">🔗 ${lk.title}</a>
            <span style="font-size:11px;color:var(--text-light);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px">${lk.url}</span>
            <button onclick="removeEvLink('${evId}','${lk.id}')" style="background:none;border:none;cursor:pointer;color:var(--text-light);font-size:14px;flex-shrink:0;padding:0 2px">✕</button>
          </div>`).join('')
        : '<div style="font-size:13px;color:var(--text-light)">등록된 링크 없음</div>'}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <input type="text" id="ev-link-title-${evId}" placeholder="링크 이름" style="width:130px">

function addEvLink(evId) {
  const title = document.getElementById('ev-link-title-'+evId).value.trim();
  const url   = document.getElementById('ev-link-url-'+evId).value.trim();
  if (!title) { toast('링크 이름을 입력해 주세요'); return; }
  if (!url)   { toast('URL을 입력해 주세요'); return; }
  const prog = getEvProg(evId);
  prog.links.push({ id: genId('lk'), title, url });
  save(); renderGongguDetail(evId); toast('링크가 추가되었습니다');
}

function removeEvLink(evId, linkId) {
  const prog = getEvProg(evId);
  prog.links = prog.links.filter(l => l.id !== linkId);
  save(); renderGongguDetail(evId);
}

function toggleEvStep(evId, idx, checked) {
  const prog = getEvProg(evId);
  prog.checked[idx] = checked;
  save(); renderGonggu(); renderGongguDetail(evId); renderToday();
}

// ══════════════ ④ 공구사 현황 (누적 이력) ══════════════
function renderVendorHistory() {
  const el = document.getElementById('vendor-hist-list');
  const sorted = [...S.vendors].sort((a, b) => {
    const lastA = S.comms.filter(c=>c.vendorId===a.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    const lastB = S.comms.filter(c=>c.vendorId===b.id).sort((x,y)=>y.date.localeCompare(x.date))[0];
    const da = lastA ? lastA.date : '0000-00-00';
    const db = lastB ? lastB.date : '0000-00-00';
    return db.localeCompare(da);
  });
  el.innerHTML = sorted.map(v => {
    const evs   = S.events.filter(e=>e.vendorId===v.id).sort((a,b)=>evStart(b).localeCompare(evStart(a)));
    const comms = [...S.comms].filter(c=>c.vendorId===v.id).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,2);
    return `
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:16px;font-weight:700;color:var(--brown)">${v.name}</div>
        <span class="badge ${v.paused?'badge-gray':'badge-green'}">${v.paused?'보류':'활성'}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div class="detail-section-label" style="margin-bottom:8px">공구 이력 (${evs.length}건)</div>
          ${evs.length ? evs.map(ev => {
            const active = evIsActive(ev);
            return `<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--cream2)">
              <span class="badge ${active?evBadgeCls(ev):'badge-gray'}" style="font-size:10px;flex-shrink:0">${active?evDdayLabel(ev):'종료'}</span>
              <div style="flex:1;font-size:13px;color:var(--text-dark);font-weight:500">${ev.title}</div>
              <span style="font-size:11px;color:var(--text-light)">${evFmtDate(ev)}</span>
            </div>`;
          }).join('') : '<div style="font-size:13px;color:var(--text-light)">없음</div>'}
        </div>
        <div>
          <div class="detail-section-label" style="margin-bottom:8px">최근 소통</div>
          ${comms.length ? comms.map(c=>`
            <div style="padding:7px 0;border-bottom:1px solid var(--cream2)">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:3px">
                <span class="badge ${typeColor(c.type)}" style="font-size:10px">${c.type}</span>
                <span style="font-size:11px;color:var(--text-light)">${c.date}</span>
              </div>
              <div style="font-size:13px;color:var(--text-dark)">${c.content.length>40?c.content.slice(0,40)+'…':c.content}</div>
            </div>`).join('')
          : '<div style="font-size:13px;color:var(--text-light)">없음</div>'}
        </div>
      </div>
    </div>`;
  }).join('');
}

// ══════════════ ④ 할 일 ══════════════
let taskFilterVendor='all', archiveOpen=false;

function initTaskForm() {
  document.getElementById('task-date').value = todayStr();
  const vSel = document.getElementById('task-vendor');
  vSel.innerHTML = '<option value="">공구사 선택</option>' + S.vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('');
  vSel.addEventListener('change', ()=>{
    const evSel = document.getElementById('task-event');
    evSel.innerHTML = '<option value="">없음</option>' +
      S.events.filter(e=>e.vendorId===vSel.value).map(e=>`<option value="${e.id}">${e.title} (${evFmtDate(e)})</option>`).join('');
  });
  document.getElementById('btn-add-task').addEventListener('click', addTask);
  document.getElementById('task-content').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
  document.getElementById('archive-toggle').addEventListener('click', ()=>{
    archiveOpen=!archiveOpen;
    document.getElementById('archive-toggle').textContent=(archiveOpen?'▼':'▶')+' 보관함 보기';
    document.getElementById('archive-list').classList.toggle('open',archiveOpen);
    renderArchive();
  });
}

function buildTaskFilters() {
  const el = document.getElementById('task-filters');
  el.innerHTML = `<button class="filter-btn ${taskFilterVendor==='all'?'active':''}" data-vendor="all">전체</button>` +
    S.vendors.map(v=>`<button class="filter-btn ${taskFilterVendor===v.id?'active':''}" data-vendor="${v.id}">${v.name}</button>`).join('');
  el.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{ taskFilterVendor=btn.dataset.vendor; buildTaskFilters(); renderTaskList(); });
  });
}

function renderTaskList() {
  const el = document.getElementById('task-list');
  let tasks = S.tasks.filter(t=>!t.archived&&(taskFilterVendor==='all'||t.vendorId===taskFilterVendor));
  tasks.sort((a,b)=>{ if(a.done!==b.done)return a.done?1:-1; return 0; });
  if (!tasks.length) { el.innerHTML='<div style="color:var(--text-light);font-size:13px;padding:16px;text-align:center">할 일이 없습니다</div>'; return; }
  el.innerHTML = tasks.map(taskItemHtml).join('');
}

function taskItemHtml(t) {
  const ev = t.eventId ? eventById(t.eventId) : null;
  const lc = t.followUpFromCommId ? commById(t.followUpFromCommId) : null;
  return `
  <div class="task-item ${t.done?'done-item':''}" id="task-item-${t.id}">
    <input type="checkbox" ${t.done?'checked':''} onchange="toggleTaskDone('${t.id}',this.checked)">
    <div class="task-item-body">
      <div class="task-item-content ${t.done?'done-text':''}">${t.content}</div>
      <div class="task-item-meta">
        ${t.createdAt?`<span style="font-size:11px;color:var(--text-light)">${fmtDate(t.createdAt)}</span>`:''}
        ${ev?`<span class="task-event-tag">${ev.title}</span>`:`<span class="today-vendor-tag">${vendorName(t.vendorId)}</span>`}
        ${t.assignee?`<span style="font-size:11px;padding:1px 6px;border-radius:4px;background:var(--brown-light);color:var(--brown);font-weight:600">👤 ${t.assignee}</span>`:''}
      </div>
    </div>
    <div class="task-item-actions">
      ${!t.done?`<button class="btn btn-sm btn-done" onclick="toggleTaskDone('${t.id}',true)">완료</button>`:''}
      <button class="btn btn-sm btn-outline" onclick="openTaskEdit('${t.id}')">수정</button>
    </div>
  </div>`;
}

function renderArchive() {
  const el = document.getElementById('archive-list');
  const archived = S.tasks.filter(t=>t.archived);
  if (!archived.length) { el.innerHTML='<div style="color:var(--text-light);font-size:13px;padding:8px 0">보관된 항목 없음</div>'; return; }
  el.innerHTML = archived.map(t=>`
    <div class="task-item archived-item">
      <div class="task-item-body">
        <div class="task-item-content done-text">${t.content}</div>
        <div class="task-item-meta"><span class="today-vendor-tag">${vendorName(t.vendorId)}</span><span class="badge badge-gray">보관됨</span></div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="restoreTask('${t.id}')">복원</button>
    </div>`).join('');
}

function addTask() {
  const vendorId = document.getElementById('task-vendor').value;
  const eventId  = document.getElementById('task-event').value || null;
  const content  = document.getElementById('task-content').value.trim();
  const dateVal  = document.getElementById('task-date').value.trim() || todayStr();
  const assignee = document.getElementById('task-assignee').value || null;
  if (!content) { toast('할 일 내용을 입력해 주세요'); return; }
  S.tasks.unshift({ id:genId('t'), vendorId, eventId, content, done:false, archived:false, isDefault:false, createdAt:dateVal, followUpFromCommId:null, assignee });
  save(); document.getElementById('task-content').value=''; document.getElementById('task-date').value=todayStr(); document.getElementById('task-assignee').value='';
  renderTaskList(); renderToday(); renderEventBars(); toast('할 일이 추가되었습니다');
}

function toggleTaskDone(id, checked) {
  const t = S.tasks.find(t=>t.id===id); if(!t) return;
  t.done=checked;
  if (checked) t.archived=true;
  save(); renderTaskList(); renderToday();
  if (selectedGongguId) renderGongguDetail(selectedGongguId);
}

function archiveTask(id) {
  const t=S.tasks.find(t=>t.id===id); if(!t) return;
  t.archived=true; save(); renderTaskList(); renderToday();
  if (archiveOpen) renderArchive(); toast('보관함으로 이동했습니다');
}

function restoreTask(id) {
  const t=S.tasks.find(t=>t.id===id); if(!t) return;
  t.archived=false; save(); renderTaskList(); renderArchive(); toast('목록으로 복원했습니다');
}

// ══════════════ ⑤ 소통 기록 ══════════════
let commFilterType='all', commSearch='';

function initCommForm() {
  document.getElementById('comm-date').value = todayStr();
  document.getElementById('comm-search').addEventListener('input', function(){ commSearch=this.value.trim(); renderCommFeed(); });
  const vSel = document.getElementById('comm-vendor');
  vSel.innerHTML = '<option value="">공구사 선택</option>' + S.vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('');
  vSel.addEventListener('change', ()=>{
    const evSel = document.getElementById('comm-event');
    evSel.innerHTML = '<option value="">없음</option>' +
      S.events.filter(e=>e.vendorId===vSel.value).map(e=>`<option value="${e.id}">${e.title} (${evFmtDate(e)})</option>`).join('');
  });
  document.getElementById('comm-followup-check').addEventListener('change', function(){
    document.getElementById('followup-section').classList.toggle('open', this.checked);
  });
  document.getElementById('comm-newevent-check').addEventListener('change', function(){
    document.getElementById('newevent-section').classList.toggle('open', this.checked);
  });
  document.getElementById('btn-add-comm').addEventListener('click', addComm);
  document.querySelectorAll('.comm-filters .filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      commFilterType=btn.dataset.type;
      document.querySelectorAll('.comm-filters .filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); renderCommFeed();
    });
  });
}

function renderCommFeed() {
  const el = document.getElementById('comm-feed');
  let comms = [...S.comms].sort((a,b)=>b.date.localeCompare(a.date));
  if (commFilterType!=='all') comms=comms.filter(c=>c.type===commFilterType);
  if (commSearch) {
    const q = commSearch.toLowerCase();
    comms = comms.filter(c => c.content.toLowerCase().includes(q) || vendorName(c.vendorId).toLowerCase().includes(q));
  }
  if (!comms.length) { el.innerHTML='<div style="color:var(--text-light);font-size:13px;padding:16px;text-align:center">소통 기록이 없습니다</div>'; return; }
  el.innerHTML = comms.map(c=>{
    const ft = c.followUpTaskId ? taskById(c.followUpTaskId) : null;
    const ev = c.eventId ? eventById(c.eventId) : null;
    return `
    <div class="comm-item" id="comm-item-${c.id}">
      <div class="comm-item-header">
        <span class="badge ${typeColor(c.type)}">${c.type}</span>
        <span class="today-vendor-tag">${vendorName(c.vendorId)}</span>
        <span style="font-size:12px;color:var(--text-light)">${c.date}</span>
        ${ev?`<span class="badge badge-brown" style="font-size:10px">${ev.title}</span>`:''}
      </div>
      <div class="comm-item-content">${c.content}</div>
      ${ft?`<div class="comm-item-followup" onclick="gotoTasks()">후속 할 일: ${ft.content} ${ft.done?'✅':'→ 미완료'}</div>`:''}
      <div style="text-align:right;margin-top:6px;display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-sm btn-outline" onclick="openCommEdit('${c.id}')">수정</button>
        <button class="btn btn-sm" style="background:var(--red-light);color:var(--red)" onclick="deleteComm('${c.id}')">삭제</button>
      </div>
    </div>`;
  }).join('');
}

function addComm() {
  const vendorId = document.getElementById('comm-vendor').value;
  const type     = document.getElementById('comm-type').value;
  let eventId    = document.getElementById('comm-event').value || null;
  const content  = document.getElementById('comm-content').value.trim();
  const hasFollowup = document.getElementById('comm-followup-check').checked;
  const followupContent = document.getElementById('followup-content').value.trim();
  if (!vendorId) { toast('공구사를 선택해 주세요'); return; }
  if (!content)  { toast('소통 내용을 입력해 주세요'); return; }
  if (hasFollowup&&!followupContent) { toast('후속 할 일 내용을 입력해 주세요'); return; }

  const commId = genId('c');
  let followUpTaskId = null;
  if (hasFollowup) {
    const taskId = genId('t');
    S.tasks.unshift({ id:taskId, vendorId, eventId, content:followupContent, done:false, archived:false, isDefault:false, createdAt:todayStr(), followUpFromCommId:commId });
    followUpTaskId = taskId;
  }
  // 새 공구 일정 생성
  const hasNewEvent = document.getElementById('comm-newevent-check').checked;
  const newEventDate    = document.getElementById('newevent-date').value.trim();
  const newEventEndDate = document.getElementById('newevent-enddate').value.trim() || null;
  const newEventTitle   = document.getElementById('newevent-title').value.trim();
  if (hasNewEvent) {
    if (!newEventDate || !/^\d{4}-\d{2}-\d{2}$/.test(newEventDate)) { toast('일정 시작 날짜를 YYYY-MM-DD 형식으로 입력해 주세요'); return; }
    if (!newEventTitle) { toast('일정 제목을 입력해 주세요'); return; }
    const newEvId = genId('evt');
    S.events.push({ id: newEvId, vendorId, startDate: newEventDate, endDate: newEventEndDate, title: newEventTitle });
    eventId = newEvId;
  }

  const commDate = document.getElementById('comm-date').value.trim() || todayStr();
  document.getElementById('comm-date').value = todayStr();
  S.comms.unshift({ id:commId, vendorId, eventId, date:commDate, type, content, followUpTaskId });
  save();

  document.getElementById('comm-vendor').value='';
  document.getElementById('comm-content').value='';
  document.getElementById('comm-followup-check').checked=false;
  document.getElementById('followup-content').value='';
  document.getElementById('followup-section').classList.remove('open');
  document.getElementById('comm-newevent-check').checked=false;
  document.getElementById('newevent-date').value='';
  document.getElementById('newevent-enddate').value='';
  document.getElementById('newevent-title').value='';
  document.getElementById('newevent-section').classList.remove('open');
  document.getElementById('comm-event').innerHTML='<option value="">없음</option>';

  renderCommFeed(); renderTaskList(); renderToday(); renderEventBars(); renderCalendar();
  const msgs = ['소통 기록이 추가되었습니다', hasFollowup && '할 일 생성됨', hasNewEvent && '공구 일정 등록됨'].filter(Boolean);
  toast(msgs.join(' · '));
}

function gotoComms() {
  document.querySelector('[data-section="comms"]').click();
}
function gotoTasks() {
  document.querySelector('[data-section="tasks"]').click();
}

function openTaskEdit(id) {
  const t = S.tasks.find(t => t.id === id); if (!t) return;
  const el = document.getElementById('task-item-' + id); if (!el) return;
  const evOptions = S.events.filter(e => e.vendorId === t.vendorId)
    .map(e => `<option value="${e.id}" ${t.eventId===e.id?'selected':''}>${e.title} (${evFmtDate(e)})</option>`).join('');
  el.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;gap:8px">
      <div class="form-row" style="margin-bottom:0">
        <div class="form-group">
          <label style="font-size:11px">날짜</label>
          <input type="text" id="edit-task-date-${id}" value="${t.createdAt||''}" style="width:120px">
        </div>
        <div class="form-group" style="flex:1">
          <label style="font-size:11px">내용</label>
          <input type="text" id="edit-task-content-${id}" value="${t.content}">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:0">
        <div class="form-group">
          <label style="font-size:11px">연결 일정</label>
          <select id="edit-task-event-${id}">
            <option value="">없음</option>${evOptions}
          </select>
        </div>
        <div class="form-group">
          <label style="font-size:11px">담당자</label>
          <select id="edit-task-assignee-${id}">
            <option value="" ${!t.assignee?'selected':''}>없음</option>
            <option value="김채원" ${t.assignee==='김채원'?'selected':''}>김채원</option>
            <option value="대표님" ${t.assignee==='대표님'?'selected':''}>대표님</option>
          </select>
        </div>
        <div class="form-group" style="justify-content:flex-end;flex-direction:row;gap:6px;align-items:flex-end">
          <button class="btn btn-primary btn-sm" onclick="saveTaskEdit('${id}')">저장</button>
          <button class="btn btn-outline btn-sm" onclick="renderTaskList()">취소</button>
        </div>
      </div>
    </div>`;
}



function saveTaskEdit(id) {
  const t = S.tasks.find(t => t.id === id); if (!t) return;
  const content = document.getElementById('edit-task-content-'+id).value.trim();
  const date    = document.getElementById('edit-task-date-'+id).value.trim();
  const eventId = document.getElementById('edit-task-event-'+id).value || null;
  if (!content) { toast('내용을 입력해 주세요'); return; }
  const assignee = document.getElementById('edit-task-assignee-'+id).value || null;
  t.content   = content;
  t.createdAt = date || t.createdAt;
  t.eventId   = eventId;
  t.assignee  = assignee;
  save(); renderTaskList(); renderToday(); renderEventBars();
  if (selectedGongguId) renderGongguDetail(selectedGongguId);
  toast('수정되었습니다');
}

function openCommEdit(id) {
  const c = S.comms.find(c => c.id === id); if (!c) return;
  const el = document.getElementById('comm-item-' + id); if (!el) return;
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:8px">
      <div class="form-row" style="margin-bottom:0">
        <div class="form-group">
          <label style="font-size:11px">날짜</label>
          <input type="text" id="edit-comm-date-${id}" value="${c.date}" style="width:120px">
        </div>
        <div class="form-group">
          <label style="font-size:11px">유형</label>
          <select id="edit-comm-type-${id}">
            ${['일정','품목','전달'].map(t=>`<option value="${t}" ${c.type===t?'selected':''}>${t}</option>`).join('')}
          </select>
        </div>
      </div>
      <div class="form-group">
        <label style="font-size:11px">내용</label>
        <textarea id="edit-comm-content-${id}" style="min-height:70px">${c.content}</textarea>
      </div>
      <div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="saveCommEdit('${id}')">저장</button>
        <button class="btn btn-outline btn-sm" onclick="renderCommFeed()">취소</button>
      </div>
    </div>`;
}

function saveCommEdit(id) {
  const c = S.comms.find(c => c.id === id); if (!c) return;
  const content = document.getElementById('edit-comm-content-'+id).value.trim();
  const date    = document.getElementById('edit-comm-date-'+id).value.trim();
  const type    = document.getElementById('edit-comm-type-'+id).value;
  if (!content) { toast('내용을 입력해 주세요'); return; }
  c.content = content;
  c.date    = date || c.date;
  c.type    = type;
  save(); renderCommFeed(); renderToday();
  toast('수정되었습니다');
}

function deleteTask(id) {
  if (!confirm('이 할 일을 삭제할까요?')) return;
  S.tasks = S.tasks.filter(t => t.id !== id);
  save(); renderTaskList(); renderToday(); renderEventBars();
  if (selectedGongguId) renderGongguDetail(selectedGongguId);
  toast('삭제되었습니다');
}

function deleteComm(id) {
  if (!confirm('이 소통 기록을 삭제할까요?')) return;
  const comm = S.comms.find(c => c.id === id);
  if (comm && comm.followUpTaskId) {
    S.tasks = S.tasks.filter(t => t.id !== comm.followUpTaskId);
  }
  S.comms = S.comms.filter(c => c.id !== id);
  save(); renderCommFeed(); renderTaskList(); renderToday();
  toast('삭제되었습니다');
}

function openEventEdit(id) {
  const ev = S.events.find(e => e.id === id); if (!ev) return;
  const el = document.getElementById('event-card-' + id) || document.getElementById('evt-bar-' + id); if (!el) return;
  const vendorOptions = S.vendors.map(v =>
    `<option value="${v.id}" ${ev.vendorId===v.id?'selected':''}>${v.name}</option>`).join('');
  el.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="form-row" style="margin-bottom:0">
        <div class="form-group">
          <label style="font-size:11px">공구사</label>
          <select id="edit-ev-vendor-${id}">${vendorOptions}</select>
        </div>
        <div class="form-group">
          <label style="font-size:11px">시작 날짜</label>
          <input type="text" id="edit-ev-start-${id}" value="${evStart(ev)}" placeholder="YYYY-MM-DD" style="width:120px">
        </div>
        <div class="form-group">
          <label style="font-size:11px">종료 날짜 (선택)</label>
          <input type="text" id="edit-ev-end-${id}" value="${evEnd(ev)||''}" placeholder="YYYY-MM-DD" style="width:120px">
        </div>
        <div class="form-group" style="flex:1">
          <label style="font-size:11px">일정 제목</label>
          <input type="text" id="edit-ev-title-${id}" value="${ev.title}">
        </div>
      </div>
      <div style="display:flex;gap:6px;justify-content:flex-end">
        <button class="btn btn-primary btn-sm" onclick="saveEventEdit('${id}')">저장</button>
        <button class="btn btn-outline btn-sm" onclick="renderEventBars()">취소</button>
      </div>
    </div>`;
}

function saveEventEdit(id) {
  const ev = S.events.find(e => e.id === id); if (!ev) return;
  const startDate = document.getElementById('edit-ev-start-'+id).value.trim();
  const endDate   = document.getElementById('edit-ev-end-'+id).value.trim() || null;
  const title     = document.getElementById('edit-ev-title-'+id).value.trim();
  const vendorId  = document.getElementById('edit-ev-vendor-'+id).value;
  if (!startDate || !/^\d{4}-\d{2}-\d{2}$/.test(startDate)) { toast('시작 날짜를 YYYY-MM-DD 형식으로 입력해 주세요'); return; }
  if (endDate && !/^\d{4}-\d{2}-\d{2}$/.test(endDate)) { toast('종료 날짜 형식을 확인해 주세요'); return; }
  if (!title) { toast('일정 제목을 입력해 주세요'); return; }
  ev.startDate = startDate; ev.endDate = endDate; ev.title = title; ev.vendorId = vendorId;
  save(); renderCalendar(); renderEventBars(); renderToday(); renderGonggu(); renderVendorHistory();
  toast('일정이 수정되었습니다');
}

function deleteEvent(id) {
  if (!confirm('이 일정을 삭제할까요?')) return;
  S.events = S.events.filter(e => e.id !== id);
  S.tasks.forEach(t => { if (t.eventId === id) t.eventId = null; });
  S.comms.forEach(c => { if (c.eventId === id) c.eventId = null; });
  save(); renderCalendar(); renderEventBars(); renderToday();
  toast('일정이 삭제되었습니다');
}

// ══════════════ ② 일정 추가 폼 ══════════════
function initEventForm() {
  const vSel = document.getElementById('event-vendor');
  vSel.innerHTML = S.vendors.map(v=>`<option value="${v.id}">${v.name}</option>`).join('');
  document.getElementById('btn-add-event').addEventListener('click', addEvent);
  document.getElementById('event-title').addEventListener('keydown', e=>{ if(e.key==='Enter') addEvent(); });
}

function addEvent() {
  const vendorId  = document.getElementById('event-vendor').value;
  const startDate = document.getElementById('event-startdate').value.trim();
  const endDate   = document.getElementById('event-enddate').value.trim() || null;
  const title     = document.getElementById('event-title').value.trim();
  if (!startDate || !/^\d{4}-\d{2}-\d{2}$/.test(startDate)) { toast('시작 날짜를 YYYY-MM-DD 형식으로 입력해 주세요'); return; }
  if (endDate && !/^\d{4}-\d{2}-\d{2}$/.test(endDate)) { toast('종료 날짜 형식을 확인해 주세요'); return; }
  if (!title) { toast('일정 제목을 입력해 주세요'); return; }
  S.events.push({ id: genId('evt'), vendorId, startDate, endDate, title });
  save();
  document.getElementById('event-startdate').value = '';
  document.getElementById('event-enddate').value = '';
  document.getElementById('event-title').value = '';
  renderCalendar(); renderEventBars(); renderToday();
  toast('일정이 추가되었습니다');
}

// ══════════════ 헤더 날짜 ══════════════
function renderHeaderDate() {
  const d=new Date();
  const dows=['일','월','화','수','목','금','토'];
  document.getElementById('header-date').textContent =
    `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${dows[d.getDay()]})`;
}

// ══════════════ 초기화 ══════════════
async function init() {
  document.getElementById('loading-overlay').style.display = 'flex';
  await load();
  document.getElementById('loading-overlay').style.display = 'none';
  renderHeaderDate();
  initTaskForm();
  initCommForm();
  initEventForm();
  buildTaskFilters();
  renderToday();
  renderGonggu();
  renderVendorHistory();
  renderTaskList();
  renderCommFeed();
}

init();
</script>
</body>
</html>
